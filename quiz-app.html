const MC_TIMER=20, FILL_TIMER=40;
const qTimer=q=>q?.type==="fill"?FILL_TIMER:MC_TIMER;

/* ══════════════════════════════════════════════════════════════

══════════════════════════════════════════════════════════════ */
const TIERS=[

  {xp:950, name:"老中",icon:"📜",color:"#9060c0"},
  {xp:1400,name:"将軍",icon:"👑",color:"#f0c040"},
];
const getRank=xp=>[...TIERS].reverse().find(t=>xp>=t.xp)||TIERS[0];
const getNext=xp=>TIERS.find(t=>t.xp>xp)||null;
const calcXP=({score,ftc,combo,perfect})=>score*3+ftc*2+Math.min(combo,10)+(perfect?30:0);

/* ══════════════════════════════════════════════════════════════
   STORAGE
══════════════════════════════════════════════════════════════ */
const SK="econ_quiz_v2";
const DEF_ST={totalXP:0,plays:0,bestScore:0,bestCombo:0,history:[],
              questionStats:{}};
// questionStats shape: { [qId]: { sessions, firstTry, retryOk, wrong } }
//   sessions  : このQが含まれたゲームの完了回数
//   firstTry  : 一発正解した回数
//   retryOk   : 再挑戦で正解した回数
//   wrong     : 誤答の累計（タイムアウト含む）

function loadSt(){
  try{const v=localStorage.getItem(SK);const d=v?JSON.parse(v):DEF_ST;
      return{...DEF_ST,...d};}
  catch{return DEF_ST;}
}
function saveSt(st){try{localStorage.setItem(SK,JSON.stringify(st));}catch{}}

// ── ゲームセーブ（一時停止用）──────────────────────────────
const GK="econ_quiz_save";
function saveGame(gameState,QS){
  try{
    // shuffled・feedback・inputsは再開時にリセットするので保存しない
    const {feedback,inputs,showHint,...rest}=gameState;
    localStorage.setItem(GK,JSON.stringify({
      state:{...rest,phase:"question",timeLeft:null,feedback:null,showHint:false,inputs:[]},
      QS,
      savedAt:new Date().toISOString(),
    }));
  }catch{}
}
function loadGame(){
  try{const v=localStorage.getItem(GK);return v?JSON.parse(v):null;}
  catch{return null;}
}
function clearGame(){try{localStorage.removeItem(GK);}catch{}}

/* ══════════════════════════════════════════════════════════════
   FILE UTILS
══════════════════════════════════════════════════════════════ */
function downloadJSON(data,filename){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}
function readJSONFile(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{try{res(JSON.parse(e.target.result));}catch{rej(new Error("JSON解析エラー"));}};
    r.onerror=()=>rej(new Error("読み込みエラー"));
    r.readAsText(file);
  });
}
function validateQS(qs){
  if(!Array.isArray(qs)||qs.length===0)return"問題が空です";
  for(const q of qs){
    if(!q.id||!q.type||!q.pts||!q.q)return`問題ID ${q.id}: 必須フィールドが不足`;
    if(q.type==="mc"&&(!Array.isArray(q.opts)||q.opts.length<2))return`問題ID ${q.id}: optsが不正`;
    if(q.type==="fill"&&(!Array.isArray(q.blanks)||q.blanks.length===0))return`問題ID ${q.id}: blanksが不正`;
  }
  return null;
}

/* ══════════════════════════════════════════════════════════════
   AUDIO
══════════════════════════════════════════════════════════════ */
let _actx=null;
const getCtx=()=>{
  if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();
  if(_actx.state==="suspended")_actx.resume().catch(()=>{});
  return _actx;
};
const tone=(freqs,{type="triangle",vol=0.22,gap=80,dur=0.25}={})=>{
  try{
    const c=getCtx();
    freqs.forEach((f,i)=>{
      if(!f)return;
      const t=c.currentTime+i*gap/1000;
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type=type;o.frequency.value=f;
      g.gain.setValueAtTime(vol,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+dur);
      o.start(t);o.stop(t+dur+0.05);
    });
  }catch(_){}
};
const SFX={
  correct:()=>tone([523,659,784],{vol:0.18,dur:0.28}),
  wrong:  ()=>tone([260,210],{type:"sawtooth",vol:0.16,gap:120,dur:0.38}),
  combo3: ()=>tone([523,659,784,1047],{vol:0.22,gap:65}),
  combo5: ()=>tone([784,988,1175,988,1175,1568],{vol:0.26,gap:58}),
  tick:   ()=>tone([1100],{type:"square",vol:0.07,gap:0,dur:0.06}),
  start:  ()=>tone([392,523,659,784],{vol:0.18,gap:80}),
  rankUp: ()=>{
    tone([523,659,784,1047],{vol:0.22,gap:70});
    setTimeout(()=>tone([1047,1175,1319,1568],{vol:0.26,gap:65}),310);
    setTimeout(()=>tone([1568,2093],{type:"sine",vol:0.2,gap:200,dur:1.0}),700);
  },
  win:()=>{
    const n=[261,329,392,523,659,784,1047,1319,1568];
    n.forEach((f,i)=>setTimeout(()=>tone([f],{vol:0.28,dur:0.55}),i*82));
    const d=n.length*82;
    setTimeout(()=>tone([523,659,784,1047],{type:"triangle",vol:0.18,gap:0,dur:2.8}),d+80);
    setTimeout(()=>tone([2093,2637],{type:"sine",vol:0.14,gap:260,dur:2.2}),d+350);
    setTimeout(()=>tone([523,659,784,1047,1319],{type:"triangle",vol:0.1,gap:0,dur:3}),d+1200);
  },
  lose:()=>tone([523,494,440,392,349,294],{type:"triangle",vol:0.18,gap:115,dur:0.35}),
};
// ── BGM：138BPM / Dドリアン / ドラム+ベース+メロディ3レイヤー ──
const _S = 60000/138/2; // 8分音符 ≈ 217ms

// 16ステップ（2小節）メロディ [Hz, vol] null=休符
const _MEL=[
  [587.3,.14],null,[440,.10],[493.9,.12],
  [523.3,.14],[440,.10],null,[392,.10],
  [587.3,.14],null,[523.3,.12],[493.9,.10],
  [440,.14],[392,.10],[329.6,.10],[349.2,.12],
];
// ベース [Hz, vol]
const _BAS=[
  [146.8,.22],null,null,[110,.14],
  [146.8,.18],null,[130.8,.14],null,
  [146.8,.22],null,null,[110,.14],
  [174.6,.18],null,[130.8,.14],null,
];
// キック（1,3拍）・スネア（2,4拍）・ハイハット
const _KICK =new Set([0,8]);
const _SNARE=new Set([4,12]);
const _HAT  =new Set([2,6,10,14]);

// ドラム音生成
const kick=()=>{
  try{
    const c=getCtx();const t=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type="sine";o.frequency.setValueAtTime(160,t);
    o.frequency.exponentialRampToValueAtTime(40,t+0.08);
    g.gain.setValueAtTime(0.55,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    o.start(t);o.stop(t+0.2);
  }catch(_){}
};
const snare=()=>{
  try{
    const c=getCtx();const t=c.currentTime;
    // ノイズ的にデチューンした3音
    [220,330,440].forEach(f=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type="sawtooth";o.frequency.value=f*(1+(Math.random()-.5)*.1);
      g.gain.setValueAtTime(0.09,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
      o.start(t);o.stop(t+0.14);
    });
  }catch(_){}
};
const hihat=()=>{
  try{
    const c=getCtx();const t=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type="square";o.frequency.value=8000+Math.random()*2000;
    g.gain.setValueAtTime(0.04,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.04);
    o.start(t);o.stop(t+0.05);
  }catch(_){}
};

let _bgmOn=false,_bgmStep=0,_bgmTid=null;
const _bgmTick=()=>{
  if(!_bgmOn)return;
  try{
    const c=getCtx();
    if(c.state==="running"){
      const st=_bgmStep%16;
      // ドラム
      if(_KICK.has(st)) kick();
      if(_SNARE.has(st)) snare();
      if(_HAT.has(st))  hihat();
      // ベース
      const b=_BAS[st];
      if(b) tone([b[0]],{type:"sawtooth",vol:b[1],gap:0,dur:0.18});
      // メロディ
      const m=_MEL[st];
      if(m) tone([m[0]],{type:"triangle",vol:m[1],gap:0,dur:0.22});
    }
  }catch(_){}
  _bgmStep++;_bgmTid=setTimeout(_bgmTick,_S);
};
const BGM={
  start:()=>{if(_bgmOn)return;_bgmOn=true;_bgmStep=0;_bgmTick();},
  stop: ()=>{_bgmOn=false;clearTimeout(_bgmTid);},
};

/* ══════════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════════ */
const getCA=q=>q.type==="mc"?[q.opts[q.ans]]:q.blanks.map(b=>b.ans[0]);
const chkFill=(blanks,inputs)=>blanks.map((b,i)=>b.ans.some(a=>a.toLowerCase()===(inputs[i]||"").trim().toLowerCase()));
const emptyInputs=q=>q.type==="fill"?new Array(q.blanks.length).fill(""):[];
function shuffleMC(q){
  const txt=q.opts[q.ans];
  const opts=[...q.opts].sort(()=>Math.random()-0.5);
  return{opts,ans:opts.indexOf(txt)};
}
const scoreColor=s=>s>=18?"#f0c040":s>=14?"#4ade80":s>=10?"#60a5fa":"#f87171";
const scoreBg   =s=>s>=18?"rgba(240,192,64,0.15)":s>=14?"rgba(74,222,128,0.12)":s>=10?"rgba(96,165,250,0.12)":"rgba(248,113,113,0.12)";
const pct=(a,b)=>b===0?0:Math.round(a/b*100);
const bar=(v,color)=>(
  <div style={{height:4,background:"#1e1e32",borderRadius:2,overflow:"hidden",marginTop:3}}>
    <div style={{height:"100%",width:`${v}%`,background:color,borderRadius:2,transition:"width 0.6s ease"}}/>
  </div>
);

/* ══════════════════════════════════════════════════════════════
   REDUCER
══════════════════════════════════════════════════════════════ */
function makeInit(QS){
  return{phase:"start",queue:QS.map((_,i)=>i),
    answeredCorrectly:[],attemptedIds:[],wrongCounts:{},questionKey:0,
    score:0,combo:0,maxCombo:0,firstTryCorrectCount:0,
    inputs:[],timeLeft:MC_TIMER,feedback:null,showHint:false,shuffled:null};
}
function reducer(s,a){
  switch(a.type){
    case"START":case"RESTART":{
      const q=a.QS[0];
      return{...makeInit(a.QS),phase:"question",inputs:emptyInputs(q),
             shuffled:q.type==="mc"?shuffleMC(q):null,timeLeft:qTimer(q),questionKey:1};
    }
    case"TICK":
      if(s.phase!=="question")return s;
      return{...s,timeLeft:Math.max(0,s.timeLeft-1)};
    case"SUBMIT":{
      if(s.phase!=="question")return s;
      const{correct,blankResults=null,QS}=a;
      const qIdx=s.queue[0],cq=QS[qIdx];
      const isFirst=!s.attemptedIds.includes(cq.id);
      if(correct){
        const nc=s.combo+1;
        return{...s,phase:"feedback",queue:s.queue.slice(1),
               answeredCorrectly:[...s.answeredCorrectly,cq.id],
               attemptedIds:isFirst?[...s.attemptedIds,cq.id]:s.attemptedIds,
               score:isFirst?s.score+cq.pts:s.score,
               firstTryCorrectCount:isFirst?s.firstTryCorrectCount+1:s.firstTryCorrectCount,
               combo:nc,maxCombo:Math.max(s.maxCombo,nc),
               feedback:{correct:true,qId:cq.id,correctAns:getCA(cq),blankResults,isFirst}};
      }else{
        return{...s,phase:"feedback",
               queue:[...s.queue.slice(1),qIdx],
               attemptedIds:isFirst?[...s.attemptedIds,cq.id]:s.attemptedIds,
               combo:0,maxCombo:Math.max(s.maxCombo,s.combo),
               wrongCounts:{...s.wrongCounts,[cq.id]:(s.wrongCounts[cq.id]||0)+1},
               feedback:{correct:false,qId:cq.id,correctAns:getCA(cq),blankResults}};
      }
    }
    case"NEXT":{
      const{QS}=a;
      if(s.queue.length===0)return{...s,phase:"complete",feedback:null};
      const nq=QS[s.queue[0]];
      return{...s,phase:"question",feedback:null,showHint:false,
             timeLeft:qTimer(nq),inputs:emptyInputs(nq),
             questionKey:s.questionKey+1,
             shuffled:nq.type==="mc"?shuffleMC(nq):null};
    }
    case"INPUT":{const ni=[...s.inputs];ni[a.idx]=a.v;return{...s,inputs:ni};}
    case"HINT":return{...s,showHint:true};
    case"BACK":return{...makeInit(a.QS),phase:"start"};
    case"RESUME":{
      // セーブデータから復元。その問題のタイマーを全リセット
      const q=a.QS[a.state.queue[0]];
      return{...a.state,
             phase:"question",
             inputs:emptyInputs(q),
             shuffled:q.type==="mc"?shuffleMC(q):null,
             timeLeft:qTimer(q),
             questionKey:(a.state.questionKey||0)+1};
    }
    default:return s;
  }
}

/* ══════════════════════════════════════════════════════════════
   XPバー
══════════════════════════════════════════════════════════════ */
function XpBar({totalXP,compact=false}){
  const rank=getRank(totalXP),next=getNext(totalXP);
  const p=next?Math.min((totalXP-rank.xp)/(next.xp-rank.xp)*100,100):100;
  return(
    <div style={{width:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:compact?11:12,color:"#888",marginBottom:4}}>
        <span style={{color:rank.color,fontWeight:700}}>{rank.icon} {rank.name}</span>
        {next?<span>{totalXP} XP → {next.name}まで {next.xp-totalXP}</span>
             :<span style={{color:"#f0c040"}}>最高位！ {totalXP} XP</span>}
      </div>
      <div style={{height:compact?5:7,background:"#1e1e32",borderRadius:4,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${p}%`,background:rank.color,borderRadius:4,transition:"width 1s ease"}}/>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   穴埋めコンポーネント
══════════════════════════════════════════════════════════════ */
function FillInline({q,inputs,dispatch,isFB,feedback,refs,onSubmit}){
  const parts=q.q.split("___");
  return(
    <div style={{fontSize:16,lineHeight:2.6,fontWeight:700,color:"#ece8d8",marginBottom:12,wordBreak:"break-all"}}>
      {parts.map((part,i)=>{
        const blank=q.blanks[i];
        const br=blank&&isFB&&feedback?.blankResults!=null?feedback.blankResults[i]:null;
        const w=blank?Math.max(90,((inputs[i]||"").length)*13+54):0;
        return(
          <span key={i}>
            <span>{part}</span>
            {blank&&(
              <input ref={el=>refs.current[i]=el}
                style={{display:"inline-block",verticalAlign:"middle",
                  background:br===true?"rgba(34,197,94,0.18)":br===false?"rgba(239,68,68,0.18)":"#1e1e3a",
                  border:`1.5px solid ${br===true?"#22c55e":br===false?"#ef4444":"#4a4a72"}`,
                  borderRadius:9,padding:"3px 10px",color:"#ece8d8",fontSize:15,
                  fontFamily:"inherit",width:w,minWidth:90,textAlign:"center",margin:"0 4px",transition:"all 0.25s"}}
                value={inputs[i]||""}
                onChange={e=>dispatch({type:"INPUT",idx:i,v:e.target.value})}
                onKeyDown={e=>{
                  if(e.key==="Tab"||e.key==="Enter"){
                    e.preventDefault();
                    if(i<q.blanks.length-1)refs.current[i+1]?.focus();
                    else if(!isFB)onSubmit();
                  }
                }}
                disabled={isFB} placeholder={`（${i+1}）`}/>
            )}
          </span>
        );
      })}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   問題別成績パネル
══════════════════════════════════════════════════════════════ */
function StatsPanel({QS,gSt,onClose}){
  const qs=gSt?.questionStats||{};
  const [sort,setSort]=useState("id"); // id | wrong | rate

  const rows=useMemo(()=>{
    const r=QS.map(q=>{
      const st=qs[q.id]||{sessions:0,firstTry:0,retryOk:0,wrong:0};
      const sessions=st.sessions||0;
      const ftRate=sessions>0?pct(st.firstTry,sessions):null;
      const avgWrong=sessions>0?Math.round((st.wrong/sessions)*10)/10:null;
      return{...st,q,sessions,ftRate,avgWrong};
    });
    if(sort==="wrong") return[...r].sort((a,b)=>(b.wrong||0)-(a.wrong||0));
    if(sort==="rate")  return[...r].sort((a,b)=>(a.ftRate??101)-(b.ftRate??101));
    return r;
  },[QS,qs,sort]);

  const totalSessions=rows.reduce((a,r)=>a+r.sessions,0);

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.80)",
      display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:200,padding:"16px",overflowY:"auto"}}>
      <div style={{background:"#13132a",border:"1px solid #2a2a44",borderRadius:18,
        padding:"20px 18px",width:"100%",maxWidth:480,display:"flex",flexDirection:"column",gap:14}}>

        {/* ヘッダー */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:16,fontWeight:800,color:"#ece8d8"}}>📊 問題別成績</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#666",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>

        {totalSessions===0?(
          <div style={{color:"#555",fontSize:13,textAlign:"center",padding:"24px 0"}}>
            まだ成績がありません。<br/>プレイするとここに記録されます。
          </div>
        ):(
          <>
            {/* 凡例 */}
            <div style={{display:"flex",gap:14,fontSize:11,color:"#666",flexWrap:"wrap"}}>
              <span><span style={{color:"#4ade80"}}>●</span> 一発正解率</span>
              <span><span style={{color:"#f97316"}}>●</span> 誤答累計</span>
              <span><span style={{color:"#888"}}>出題</span> = ゲーム完了回数</span>
            </div>

            {/* ソートボタン */}
            <div style={{display:"flex",gap:6}}>
              {[["id","問題順"],["wrong","誤答が多い順"],["rate","正解率が低い順"]].map(([k,label])=>(
                <button key={k} onClick={()=>setSort(k)}
                  style={{background:sort===k?"#c9a84c":"#1e1e36",
                    border:`1px solid ${sort===k?"#c9a84c":"#333"}`,
                    borderRadius:8,padding:"4px 10px",fontSize:11,
                    color:sort===k?"#0d0d18":"#888",cursor:"pointer",fontFamily:"inherit"}}>
                  {label}
                </button>
              ))}
            </div>

            {/* 問題リスト */}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {rows.map(({q,sessions,firstTry,retryOk,wrong,ftRate,avgWrong})=>{
                const shortQ=q.q.length>40?q.q.slice(0,40)+"…":q.q;
                const correctAns=getCA(q).join(" / ");
                const neverPlayed=sessions===0;
                return(
                  <div key={q.id} style={{background:"#0d0d20",borderRadius:12,padding:"12px 14px",
                    opacity:neverPlayed?0.45:1}}>
                    {/* 問題文・正解 */}
                    <div style={{fontSize:12,color:"#ece8d8",fontWeight:700,marginBottom:2,lineHeight:1.5}}>
                      <span style={{color:"#555",marginRight:4}}>Q{q.id}</span>{shortQ}
                    </div>
                    <div style={{fontSize:11,color:"#c9a84c",marginBottom:8}}>
                      正解: {correctAns}
                    </div>

                    {neverPlayed?(
                      <div style={{fontSize:11,color:"#444"}}>未出題</div>
                    ):(
                      <>
                        {/* 数値行 */}
                        <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:6}}>
                          <div style={{textAlign:"center"}}>
                            <div style={{fontSize:16,fontWeight:800,color:"#888"}}>{sessions}</div>
                            <div style={{fontSize:10,color:"#555"}}>出題回数</div>
                          </div>
                          <div style={{textAlign:"center"}}>
                            <div style={{fontSize:16,fontWeight:800,color:"#4ade80"}}>{firstTry}</div>
                            <div style={{fontSize:10,color:"#555"}}>一発正解</div>
                          </div>
                          <div style={{textAlign:"center"}}>
                            <div style={{fontSize:16,fontWeight:800,color:"#60a5fa"}}>{retryOk}</div>
                            <div style={{fontSize:10,color:"#555"}}>再挑戦正解</div>
                          </div>
                          <div style={{textAlign:"center"}}>
                            <div style={{fontSize:16,fontWeight:800,color:"#f87171"}}>{wrong}</div>
                            <div style={{fontSize:10,color:"#555"}}>誤答累計</div>
                          </div>
                          <div style={{textAlign:"center"}}>
                            <div style={{fontSize:16,fontWeight:800,color:"#f97316"}}>{avgWrong}</div>
                            <div style={{fontSize:10,color:"#555"}}>平均ミス数</div>
                          </div>
                        </div>

                        {/* 一発正解率バー */}
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#555",marginBottom:2}}>
                              <span>一発正解率</span>
                              <span style={{color:ftRate>=80?"#4ade80":ftRate>=50?"#f97316":"#f87171",fontWeight:700}}>{ftRate}%</span>
                            </div>
                            <div style={{height:5,background:"#1e1e32",borderRadius:3,overflow:"hidden"}}>
                              <div style={{height:"100%",width:`${ftRate}%`,
                                background:ftRate>=80?"#4ade80":ftRate>=50?"#f97316":"#f87171",
                                borderRadius:3,transition:"width 0.8s ease"}}/>
                            </div>
                          </div>
                        </div>
                      </>
                    )}
                  </div>
                );
              })}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   問題管理パネル（複数選択・一括削除）
══════════════════════════════════════════════════════════════ */
function QManagePanel({QS,setQS,onClose}){
  const[selected,setSelected]=useState(new Set());
  const[confirm,setConfirm]=useState(false);

  const toggle=(id)=>setSelected(prev=>{
    const s=new Set(prev);
    s.has(id)?s.delete(id):s.add(id);
    return s;
  });
  const toggleAll=()=>{
    if(selected.size===QS.length)setSelected(new Set());
    else setSelected(new Set(QS.map(q=>q.id)));
  };
  const deleteSelected=()=>{
    setQS(prev=>prev.filter(q=>!selected.has(q.id)));
    setSelected(new Set());
    setConfirm(false);
  };

  const allChecked=QS.length>0&&selected.size===QS.length;
  const someChecked=selected.size>0;

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.80)",
      display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:200,
      padding:"16px",overflowY:"auto"}}>
      <div style={{background:"#13132a",border:"1px solid #2a2a44",borderRadius:18,
        padding:"20px 18px",width:"100%",maxWidth:480,display:"flex",flexDirection:"column",gap:12}}>

        {/* ヘッダー */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:16,fontWeight:800,color:"#ece8d8"}}>📝 問題を編集</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#666",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>

        {/* ツールバー */}
        <div style={{display:"flex",alignItems:"center",gap:10,
          background:"#0d0d20",borderRadius:10,padding:"10px 12px"}}>
          {/* 全選択チェックボックス */}
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",userSelect:"none"}}>
            <input type="checkbox" checked={allChecked} onChange={toggleAll}
              style={{width:16,height:16,cursor:"pointer",accentColor:"#c9a84c"}}/>
            <span style={{fontSize:12,color:"#aaa"}}>
              {someChecked?`${selected.size}問選択中`:"すべて選択"}
            </span>
          </label>
          <div style={{flex:1}}/>
          {someChecked&&!confirm&&(
            <button onClick={()=>setConfirm(true)}
              style={{background:"#3a1010",border:"1px solid #c04040",borderRadius:8,
                padding:"5px 14px",fontSize:12,color:"#f87171",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
              {selected.size}問を削除
            </button>
          )}
          {confirm&&(
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span style={{fontSize:11,color:"#f87171"}}>本当に削除しますか？</span>
              <button onClick={deleteSelected}
                style={{background:"#c04040",border:"none",borderRadius:6,
                  padding:"4px 12px",fontSize:12,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
                削除
              </button>
              <button onClick={()=>setConfirm(false)}
                style={{background:"#2a2a44",border:"none",borderRadius:6,
                  padding:"4px 10px",fontSize:12,color:"#aaa",cursor:"pointer",fontFamily:"inherit"}}>
                戻る
              </button>
            </div>
          )}
        </div>

        {/* 問題リスト */}
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {QS.map((q,idx)=>{
            const checked=selected.has(q.id);
            const shortQ=q.q.length>42?q.q.slice(0,42)+"…":q.q;
            const correctAns=getCA(q).join(" · ");
            return(
              <label key={q.id} style={{display:"flex",alignItems:"flex-start",gap:10,
                background:checked?"rgba(201,168,76,0.08)":"#0d0d20",
                border:`1px solid ${checked?"#c9a84c":"#1e1e32"}`,
                borderRadius:10,padding:"10px 12px",cursor:"pointer",
                transition:"all 0.15s",userSelect:"none"}}>
                <input type="checkbox" checked={checked} onChange={()=>toggle(q.id)}
                  style={{width:16,height:16,marginTop:2,cursor:"pointer",accentColor:"#c9a84c",flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,color:checked?"#ece8d8":"#aaa",fontWeight:700,lineHeight:1.5}}>
                    <span style={{color:"#555",marginRight:4,fontSize:11}}>#{idx+1}</span>
                    {shortQ}
                  </div>
                  <div style={{fontSize:11,color:"#c9a84c",marginTop:2}}>正解: {correctAns}</div>
                </div>
              </label>
            );
          })}
        </div>

        {QS.length===0&&(
          <div style={{color:"#555",fontSize:13,textAlign:"center",padding:"12px 0"}}>
            問題がありません。インポートで追加してください。
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   インポート/エクスポートパネル
══════════════════════════════════════════════════════════════ */
function IOPanel({QS,setQS,gSt,setGSt,onClose}){
  const[msg,setMsg]=useState(null);
  const[pendingImport,setPendingImport]=useState(null);
  const qRef=useRef(),sRef=useRef();
  const flash=(text,ok=true)=>{setMsg({text,ok});setTimeout(()=>setMsg(null),3000);};

  const exportQ=()=>{
    downloadJSON({_type:"econ_quiz_questions",version:1,questions:QS},
      `questions_${new Date().toLocaleDateString("ja-JP").replace(/\//g,"-")}.json`);
    flash("問題セットをエクスポートしました");
  };
  const importQ=async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const data=await readJSONFile(file);const qs=data.questions||data;
      const err=validateQS(qs);if(err){flash("エラー："+err,false);return;}
      // 重複IDを除いた追加分
      const newIds=new Set(qs.map(q=>q.id));
      const merged=[...QS.filter(q=>!newIds.has(q.id)),...qs];
      if(QS.length===0){
        setQS(qs);flash(`${qs.length}問を読み込みました`);
      } else {
        setPendingImport({qs,merged});
      }
    }catch(err){flash("エラー："+err.message,false);}
    e.target.value="";
  };
  const exportS=()=>{
    if(!gSt){flash("成績データがありません",false);return;}
    downloadJSON({_type:"econ_quiz_stats",version:1,...gSt},
      `stats_${new Date().toLocaleDateString("ja-JP").replace(/\//g,"-")}.json`);
    flash("成績をエクスポートしました");
  };
  const importS=async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const data=await readJSONFile(file);
      if(typeof data.totalXP!=="number"){flash("エラー：成績データの形式が違います",false);return;}
      const clean={...DEF_ST,...data};
      setGSt(clean);saveSt(clean);flash("成績をインポートしました");
    }catch(err){flash("エラー："+err.message,false);}
    e.target.value="";
  };
  const resetS=()=>{
    if(!window.confirm("成績をリセットしますか？この操作は取り消せません。"))return;
    saveSt(DEF_ST);setGSt({...DEF_ST});flash("成績をリセットしました");
  };
  const resetQ=()=>{
    if(!window.confirm("問題をデフォルトに戻しますか？"))return;
    setQS(DEFAULT_QS);flash("デフォルト問題に戻しました");
  };
  const Btn=({onClick,color,children})=>(
    <button onClick={onClick} style={{background:color||"#1e1e36",border:`1px solid ${color||"#3a3a58"}`,
      borderRadius:9,padding:"9px 14px",color:color?"#0d0d18":"#ccc",
      fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",width:"100%",textAlign:"left"}}>
      {children}
    </button>
  );
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}}>
      <div style={{background:"#13132a",border:"1px solid #2a2a44",borderRadius:18,
        padding:"24px 20px",width:"100%",maxWidth:360,display:"flex",flexDirection:"column",gap:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:16,fontWeight:800,color:"#ece8d8"}}>📦 インポート / エクスポート</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#666",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>
        {msg&&<div style={{background:msg.ok?"rgba(34,197,94,0.12)":"rgba(239,68,68,0.12)",
          border:`1px solid ${msg.ok?"#22c55e":"#ef4444"}`,borderRadius:9,
          padding:"8px 12px",fontSize:13,color:msg.ok?"#4ade80":"#f87171"}}>{msg.text}</div>}

        {/* インポート方法の選択ダイアログ */}
        {pendingImport&&(
          <div style={{background:"#0d0d20",border:"1px solid #c9a84c",borderRadius:12,padding:"14px"}}>
            <div style={{fontSize:13,color:"#ece8d8",fontWeight:700,marginBottom:4}}>
              {pendingImport.qs.length}問を読み込みます
            </div>
            <div style={{fontSize:11,color:"#888",marginBottom:12}}>
              現在 {QS.length}問 → 追加後 {pendingImport.merged.length}問 / 置き換え後 {pendingImport.qs.length}問
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{
                setQS(pendingImport.merged);
                setPendingImport(null);
                flash(`${pendingImport.merged.length}問になりました（${pendingImport.qs.length}問を追加）`);
              }} style={{flex:1,background:"#1e3a1e",border:"1px solid #22c55e",borderRadius:8,
                padding:"8px 0",fontSize:12,color:"#4ade80",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
                ➕ 追加する
              </button>
              <button onClick={()=>{
                setQS(pendingImport.qs);
                setPendingImport(null);
                flash(`${pendingImport.qs.length}問に置き換えました`);
              }} style={{flex:1,background:"#1e1e36",border:"1px solid #555",borderRadius:8,
                padding:"8px 0",fontSize:12,color:"#aaa",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
                🔄 置き換える
              </button>
              <button onClick={()=>setPendingImport(null)}
                style={{background:"none",border:"1px solid #333",borderRadius:8,
                  padding:"8px 10px",fontSize:12,color:"#555",cursor:"pointer",fontFamily:"inherit"}}>
                ✕
              </button>
            </div>
          </div>
        )}
        <div>
          <div style={{fontSize:11,color:"#666",letterSpacing:1,marginBottom:8}}>── 問題セット（{QS.length}問）</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            <Btn onClick={exportQ}>⬇ 問題セットをダウンロード</Btn>
            <Btn onClick={()=>qRef.current.click()}>⬆ 問題セットを読み込む</Btn>
            <input ref={qRef} type="file" accept=".json" style={{display:"none"}} onChange={importQ}/>
            <Btn onClick={resetQ}>↩ デフォルト問題に戻す</Btn>
          </div>
        </div>
        <div>
          <div style={{fontSize:11,color:"#666",letterSpacing:1,marginBottom:8}}>── 成績データ</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            <Btn onClick={exportS}>⬇ 成績をダウンロード</Btn>
            <Btn onClick={()=>sRef.current.click()}>⬆ 成績を読み込む</Btn>
            <input ref={sRef} type="file" accept=".json" style={{display:"none"}} onChange={importS}/>
            <Btn onClick={resetS} color="#c04040">⚠ 成績をリセット</Btn>
          </div>
        </div>
        <details style={{fontSize:11,color:"#555",cursor:"pointer"}}>
          <summary style={{color:"#666",marginBottom:6}}>問題JSONの書き方</summary>
          <pre style={{background:"#0d0d20",borderRadius:8,padding:"10px",fontSize:10,color:"#aaa",overflow:"auto",lineHeight:1.6}}>{`{
  "questions": [
    {
      "id": "a3f9b2c1",
      "type": "mc", "pts": 1,
      "q": "問題文",
      "opts": ["A","B","C","D"],
      "ans": 0,
      "hint": "ヒント"
    },
    {
      "id": "e1b4d7f9",
      "type": "fill", "pts": 2,
      "q": "___は何か",
      "blanks": [{"ans": ["正解","よみがな"]}],
      "hint": "ヒント"
    }
  ]
}
※ id はランダムな8文字で。同じ問題を微修正するときは
  id をそのまま使うと成績が引き継がれます。`}</pre>
        </details>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   APP
══════════════════════════════════════════════════════════════ */
function QuizApp(){
  const[QS,setQS]=useState(DEFAULT_QS);
  const[s,dispatch]=useReducer(reducer,makeInit(DEFAULT_QS));
  const{phase,queue,score,combo,maxCombo,inputs,timeLeft,feedback,
        showHint,wrongCounts,questionKey,answeredCorrectly,shuffled,firstTryCorrectCount}=s;
  const refs=useRef([]);
  const[gSt,setGSt]=useState(()=>loadSt());
  const[rankUp,setRankUp]=useState(null);
  const[xpInfo,setXpInfo]=useState(null);
  const[showIO,setShowIO]=useState(false);
  const[showStats,setShowStats]=useState(false);
  const[showQManage,setShowQManage]=useState(false);
  const[savedGame,setSavedGame]=useState(()=>loadGame());

  const MAX_SCORE=QS.reduce((a,q)=>a+q.pts,0);

  /* 完了時：XP + 問題別成績を保存 */
  useEffect(()=>{
    if(phase!=="complete"||!gSt)return;
    const ftc=firstTryCorrectCount,perfect=ftc===QS.length;
    const earned=calcXP({score,ftc,combo:maxCombo,perfect});
    setXpInfo({earned,scoreXP:score*3,ftcXP:ftc*2,comboXP:Math.min(maxCombo,10),perfectXP:perfect?30:0,ftc,perfect});

    // 問題別成績を更新
    const prevQS=gSt.questionStats||{};
    const newQS={...prevQS};
    QS.forEach(q=>{
      const prev=prevQS[q.id]||{sessions:0,firstTry:0,retryOk:0,wrong:0};
      const wasAnswered=answeredCorrectly.includes(q.id);
      const wc=wrongCounts[q.id]||0;
      const isFirstTry=wasAnswered&&wc===0;
      const isRetryOk=wasAnswered&&wc>0;
      newQS[q.id]={
        sessions: prev.sessions+(wasAnswered?1:0),
        firstTry: prev.firstTry+(isFirstTry?1:0),
        retryOk:  prev.retryOk+(isRetryOk?1:0),
        wrong:    prev.wrong+wc,
      };
    });

    const oldRank=getRank(gSt.totalXP),newXP=gSt.totalXP+earned,newRank=getRank(newXP);
    const newSt={
      totalXP:newXP,plays:gSt.plays+1,
      bestScore:Math.max(gSt.bestScore,score),bestCombo:Math.max(gSt.bestCombo,maxCombo),
      history:[...gSt.history.slice(-9),{score,xp:earned,
        date:new Date().toLocaleDateString("ja-JP",{month:"numeric",day:"numeric"})}],
      questionStats:newQS,
    };
    setGSt(newSt);saveSt(newSt);
    clearGame();setSavedGame(null); // セーブデータ削除
    if(newRank.name!==oldRank.name){setRankUp({from:oldRank,to:newRank});setTimeout(SFX.rankUp,900);}
    setTimeout(()=>score>=MAX_SCORE*0.7?SFX.win():SFX.lose(),500);
  },[phase]);

  const q=phase==="feedback"&&feedback?QS.find(qq=>qq.id===feedback.qId):(queue.length>0?QS[queue[0]]:null);
  const dq=q&&shuffled&&q.type==="mc"?{...q,...shuffled}:q;
  const wrongCount=q?(wrongCounts[q.id]||0):0;
  const isFB=phase==="feedback";
  const maxT=qTimer(q||QS[0]);
  const timerPct=timeLeft/maxT*100;
  const timerColor=timeLeft<=5?"#ef4444":timeLeft<=10?"#f97316":"#c9a84c";

  useEffect(()=>{
    if(phase!=="question")return;
    const id=setInterval(()=>dispatch({type:"TICK"}),1000);
    return()=>clearInterval(id);
  },[questionKey]);
  useEffect(()=>{
    if(phase!=="question")return;
    if(timeLeft<=5&&timeLeft>0)SFX.tick();
    if(timeLeft===0)dispatch({type:"SUBMIT",correct:false,blankResults:null,QS});
  },[timeLeft]);
  useEffect(()=>{
    if(phase!=="feedback"||!feedback)return;
    if(feedback.correct){SFX.correct();
      if(combo===3)setTimeout(SFX.combo3,320);
      else if(combo===5||combo===10)setTimeout(SFX.combo5,320);
    }else SFX.wrong();
  },[phase,feedback]);
  useEffect(()=>{
    if(phase!=="feedback")return;
    const id=setTimeout(()=>dispatch({type:"NEXT",QS}),feedback?.correct?1900:3200);
    return()=>clearTimeout(id);
  },[phase,questionKey]);
  useEffect(()=>{
    if(phase==="question"||phase==="feedback")BGM.start();
    else BGM.stop();
  },[phase]);
  useEffect(()=>()=>BGM.stop(),[]);
  useEffect(()=>{
    if(phase==="question"&&q?.type==="fill")setTimeout(()=>refs.current[0]?.focus(),150);
  },[questionKey]);

  const submitFill=()=>{
    if(phase!=="question"||!q)return;
    const r=chkFill(q.blanks,inputs);
    dispatch({type:"SUBMIT",correct:r.every(Boolean),blankResults:r,QS});
  };
  const submitMC=(idx)=>{
    if(phase!=="question"||!dq)return;
    dispatch({type:"SUBMIT",correct:idx===dq.ans,blankResults:null,QS});
  };
  const doStart=()=>{
    try{getCtx().resume().catch(()=>{});}catch(_){}
    SFX.start();setRankUp(null);setXpInfo(null);
    clearGame();setSavedGame(null);
    dispatch({type:"START",QS});
  };
  const doResume=()=>{
    if(!savedGame)return;
    try{getCtx().resume().catch(()=>{});}catch(_){}
    SFX.start();setRankUp(null);setXpInfo(null);
    setQS(savedGame.QS);
    dispatch({type:"RESUME",state:savedGame.state,QS:savedGame.QS});
  };
  const doPause=()=>{
    saveGame(s,QS);
    setSavedGame(loadGame());
    dispatch({type:"BACK",QS});
  };

  /* ── スタート画面 ─────────────────────────────────────────── */
  if(phase==="start"){
    const rank=gSt?getRank(gSt.totalXP):null;
    const hist=gSt?.history||[];
    return(
      <div style={S.root}>
        {showIO&&<IOPanel QS={QS} setQS={setQS} gSt={gSt} setGSt={setGSt} onClose={()=>setShowIO(false)}/>}
        {showStats&&<StatsPanel QS={QS} gSt={gSt} onClose={()=>setShowStats(false)}/>}
        {showQManage&&<QManagePanel QS={QS} setQS={setQS} onClose={()=>setShowQManage(false)}/>}
        <div style={S.center}>
          <div style={S.card}>
            <div style={S.logo}>経済史</div>
            <h1 style={S.title}>道場クイズ</h1>
            {gSt&&rank&&(
              <div style={{width:"100%",background:"#0d0d20",borderRadius:12,padding:"14px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <span style={{fontSize:26}}>{rank.icon}</span>
                  <div>
                    <div style={{fontSize:17,fontWeight:800,color:rank.color}}>{rank.name}</div>
                    <div style={{fontSize:11,color:"#555"}}>{gSt.plays}回プレイ</div>
                  </div>
                  <div style={{marginLeft:"auto",textAlign:"right"}}>
                    <div style={{fontSize:11,color:"#666"}}>最高得点</div>
                    <div style={{fontSize:15,fontWeight:700,color:scoreColor(gSt.bestScore)}}>{gSt.bestScore}/{MAX_SCORE}</div>
                  </div>
                </div>
                <XpBar totalXP={gSt.totalXP} compact/>
                {hist.length>0&&(
                  <div style={{marginTop:10,display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center"}}>
                    {hist.slice(-8).map((h,i)=>(
                      <div key={i} style={{background:scoreBg(h.score),border:`1px solid ${scoreColor(h.score)}`,
                        borderRadius:6,padding:"2px 7px",fontSize:11,color:scoreColor(h.score),fontWeight:700}}>
                        {h.score}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
            <p style={{...S.sub,marginTop:2}}>{QS.length}問 · {MAX_SCORE}点満点 · 選択式{MC_TIMER}秒 / 記述式{FILL_TIMER}秒</p>

            {/* 続きから再開 */}
            {savedGame&&(()=>{
              const sg=savedGame;
              const done=sg.state.answeredCorrectly?.length||0;
              const total=sg.QS?.length||0;
              const d=new Date(sg.savedAt);
              const dateStr=d.toLocaleDateString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
              return(
                <div style={{width:"100%",background:"#0a1a0a",border:"1px solid #22c55e",borderRadius:12,padding:"14px 16px"}}>
                  <div style={{fontSize:DK?13:11,color:"#4ade80",fontWeight:700,marginBottom:6}}>
                    ⏸ 続きのゲームがあります
                  </div>
                  <div style={{fontSize:DK?12:10,color:"#666",marginBottom:10}}>
                    {dateStr} 中断 · {done}/{total}問クリア済み · {sg.state.score}pt
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={doResume}
                      style={{flex:1,background:"#22c55e",border:"none",borderRadius:9,
                        padding:DK?"10px 0":"8px 0",fontSize:DK?15:12,fontWeight:800,
                        color:"#0d0d18",cursor:"pointer",fontFamily:"inherit"}}>
                      ▶ 続きから再開
                    </button>
                    <button onClick={()=>{clearGame();setSavedGame(null);}}
                      style={{background:"none",border:"1px solid #333",borderRadius:9,
                        padding:"8px 12px",fontSize:DK?13:11,color:"#555",
                        cursor:"pointer",fontFamily:"inherit"}}>
                      ✕
                    </button>
                  </div>
                </div>
              );
            })()}
            <div style={S.badges}>
              {["🔥 コンボ","🔄 正解まで繰り返し","🎵 BGM","⬆️ 道場レベル"].map(b=><span key={b} style={S.badge}>{b}</span>)}
            </div>
            <button style={S.btnG} onClick={doStart}>稽古開始</button>
            {/* サブボタン3つ */}
            <div style={{display:"flex",gap:8,width:"100%"}}>
              <button onClick={()=>setShowStats(true)}
                style={{flex:1,background:"none",border:"1px solid #2a2a44",color:"#aaa",
                  borderRadius:9,padding:"8px 0",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
                📊 問題別成績
              </button>
              <button onClick={()=>setShowQManage(true)}
                style={{flex:1,background:"none",border:"1px solid #2a2a44",color:"#aaa",
                  borderRadius:9,padding:"8px 0",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
                📝 問題を編集
              </button>
              <button onClick={()=>setShowIO(true)}
                style={{flex:1,background:"none",border:"1px solid #2a2a44",color:"#888",
                  borderRadius:9,padding:"8px 0",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
                📦 管理
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ── 完了画面 ─────────────────────────────────────────────── */
  if(phase==="complete"){
    const newRankObj=gSt?getRank(gSt.totalXP):null;
    const isBest=gSt&&score>0&&score===gSt.bestScore&&gSt.plays>1;
    return(
      <div style={S.root}>
        <div style={S.center}>
          <div style={{...S.card,gap:12,maxWidth:400}}>
            <div style={{fontSize:40,animation:"bounceIn 0.6s ease"}}>
              {score/MAX_SCORE>=0.9?"🏆":score/MAX_SCORE>=0.7?"⚔️":score/MAX_SCORE>=0.5?"🌾":"🗾"}
            </div>
            <div style={{display:"flex",alignItems:"baseline",gap:4}}>
              <span style={{fontSize:50,fontWeight:900,color:scoreColor(score)}}>{score}</span>
              <span style={{fontSize:17,color:"#555",alignSelf:"flex-end",marginBottom:7}}>/{MAX_SCORE}点</span>
            </div>
            <div style={S.statsRow}>
              <div style={S.stat}><div style={{...S.statN,color:scoreColor(score)}}>{answeredCorrectly.length}/{QS.length}</div><div style={S.statL}>正解</div></div>
              <div style={S.stat}><div style={S.statN}>{xpInfo?.ftc||0}/{QS.length}</div><div style={S.statL}>一発正解</div></div>
              <div style={S.stat}><div style={{...S.statN,color:"#f97316"}}>{maxCombo}</div><div style={S.statL}>最大コンボ</div></div>
            </div>
            {xpInfo&&(
              <div style={{width:"100%",background:"#0d0d20",borderRadius:12,padding:"12px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontSize:12,color:"#aaa"}}>今回の獲得XP</span>
                  <span style={{fontSize:16,fontWeight:800,color:"#c9a84c"}}>+{xpInfo.earned} XP</span>
                </div>
                {[
                  [`得点 ${score}pt × 3`,xpInfo.scoreXP],
                  [`一発正解 ${xpInfo.ftc}問 × 2`,xpInfo.ftcXP],
                  [`コンボボーナス`,xpInfo.comboXP],
                  xpInfo.perfect?[`全問一発正解ボーナス 🎉`,xpInfo.perfectXP]:null,
                ].filter(Boolean).map(([label,val])=>(
                  <div key={label} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#555",marginBottom:3}}>
                    <span>{label}</span><span style={{color:"#777"}}>+{val}</span>
                  </div>
                ))}
                <div style={{borderTop:"1px solid #2a2a3a",marginTop:10,paddingTop:10}}>
                  {gSt&&<XpBar totalXP={gSt.totalXP}/>}
                </div>
              </div>
            )}
            {isBest&&<div style={{background:"rgba(240,192,64,0.1)",border:"1px solid #f0c040",
              borderRadius:10,padding:"7px 14px",fontSize:12,color:"#f0c040",animation:"bounceIn 0.5s ease"}}>
              🏆 自己ベスト更新！
            </div>}
            {rankUp&&(
              <div style={{width:"100%",background:"rgba(255,255,255,0.03)",
                border:`2px solid ${rankUp.to.color}`,borderRadius:14,
                padding:"12px",textAlign:"center",animation:"rankUpAnim 0.6s ease"}}>
                <div style={{fontSize:10,letterSpacing:3,color:"#aaa",marginBottom:6}}>⬆ 昇　格</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                  <span style={{fontSize:13,color:rankUp.from.color}}>{rankUp.from.icon} {rankUp.from.name}</span>
                  <span style={{color:"#555",fontSize:16}}>→</span>
                  <span style={{fontSize:17,fontWeight:800,color:rankUp.to.color}}>{rankUp.to.icon} {rankUp.to.name}</span>
                </div>
              </div>
            )}
            {newRankObj&&<div style={{fontSize:11,color:"#555"}}>
              現在の称号：<span style={{color:newRankObj.color,fontWeight:700}}>{newRankObj.icon} {newRankObj.name}</span>
            </div>}
            <div style={{display:"flex",gap:8,width:"100%"}}>
              <button style={{...S.btnG,flex:1}} onClick={doStart}>もう一度</button>
              <button onClick={()=>dispatch({type:"BACK",QS})}
                style={{background:"none",border:"1px solid #2a2a44",color:"#888",
                  borderRadius:12,padding:"12px 16px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>🏠</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  if(!q||!dq)return null;

  /* ── 問題画面 ─────────────────────────────────────────────── */
  return(
    <div style={S.root}>
      {isFB&&<div className="flashFade" style={{...S.flashOverlay,
        background:feedback?.correct?"rgba(34,197,94,0.18)":"rgba(239,68,68,0.42)",
        animationDuration:feedback?.correct?"1.9s":"3.2s"}}/>}
      <div style={S.top}>
        <div style={S.prog}><div style={{...S.progF,width:`${answeredCorrectly.length/QS.length*100}%`}}/></div>
        <div style={S.topRow}>
          <span style={S.qnum}>✓{answeredCorrectly.length}<span style={{color:"#444",fontSize:10}}>/{QS.length}</span></span>
          {combo>0&&<span className="comboPop" style={S.comboTag}>{"🔥".repeat(Math.min(combo,5))} ×{combo}</span>}
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={S.scorePill}>{score}<span style={{color:"#444",fontSize:10}}>pt</span></span>
            <button onClick={doPause}
              style={{background:"none",border:"1px solid #2a2a44",borderRadius:7,
                padding:DK?"4px 12px":"3px 9px",fontSize:DK?13:10,color:"#666",
                cursor:"pointer",fontFamily:"inherit"}}>
              ⏸ 中断
            </button>
          </div>
        </div>
      </div>
      <div style={S.timerW}>
        <div style={{...S.timerF,width:`${timerPct}%`,background:timerColor,
          animation:phase==="question"&&timeLeft<=5?"timerPulse 0.5s ease infinite":"none"}}/>
        <span style={{...S.timerN,color:timerColor}}>{phase==="question"?`${timeLeft}s`:""}</span>
      </div>
      <div style={S.qcard} className={isFB&&!feedback?.correct?"shake":""}>
        <div style={S.qmeta}>
          {q.type==="fill"?"穴埋め":"選択式"} · {q.pts}点
          {wrongCount>0&&<span style={{color:"#f97316",marginLeft:8,fontSize:11}}>🔄 再挑戦 {wrongCount}回目</span>}
        </div>
        {q.type==="mc"?<p style={S.qtxt}>{dq.q}</p>
          :<FillInline q={q} inputs={inputs} dispatch={dispatch}
              isFB={isFB} feedback={feedback} refs={refs} onSubmit={submitFill}/>}
        {!showHint&&!isFB&&<button style={S.hintBtn} onClick={()=>dispatch({type:"HINT"})}>💡 ヒント</button>}
        {showHint&&<div style={S.hintBox}>💡 {q.hint}</div>}
        {q.type==="mc"&&(
          <div style={S.optG}>
            {dq.opts.map((opt,i)=>(
              <button key={i} onClick={()=>submitMC(i)} disabled={isFB}
                style={{...S.optBtn,
                  background:isFB&&i===dq.ans?"rgba(34,197,94,0.2)":"#1a1a2e",
                  border:`1px solid ${isFB&&i===dq.ans?"#22c55e":"#2a2a42"}`}}>
                <span style={S.optL}>{["A","B","C","D"][i]}</span>
                <span style={S.optT}>{opt}</span>
              </button>
            ))}
          </div>
        )}
        {q.type==="fill"&&!isFB&&(
          <button style={{...S.btnG,marginTop:12,padding:"10px 28px",fontSize:14}}
            onClick={submitFill} disabled={inputs.some(v=>!v.trim())}>回答する ✓</button>
        )}
        {isFB&&feedback?.correct&&(
          <div style={S.correctBanner}>
            <span style={{fontSize:22}}>⭕</span>
            <span style={{color:"#4ade80",fontWeight:700,fontSize:15}}>正解！</span>
            {feedback.isFirst
              ?<span style={{color:"#c9a84c",fontWeight:700,fontSize:13,marginLeft:4}}>+{q.pts}pt</span>
              :<span style={{color:"#777",fontSize:12,marginLeft:4}}>再挑戦正解（加点なし）</span>}
            {combo>=3&&<span className="comboPop" style={{color:"#f97316",fontWeight:700,marginLeft:4}}>🔥{combo}コンボ！</span>}
          </div>
        )}
        {isFB&&!feedback?.correct&&(
          <div style={S.wrongReveal}>
            <div style={S.wrongTop}>
              <span style={{fontSize:20}}>❌</span>
              <span style={{fontSize:15,fontWeight:700,color:"#f87171"}}>不正解</span>
            </div>
            <div style={S.correctLabel}>正　解</div>
            <div style={S.correctBlock}>
              {feedback.correctAns.map((ans,i)=>(
                <div key={i} style={S.correctAnsRow}>
                  {q.blanks&&q.blanks.length>1&&<span style={{fontSize:12,color:"#888",marginRight:4}}>（{i+1}）</span>}
                  <span style={S.correctAns}>{ans}</span>
                </div>
              ))}
            </div>
            <div style={S.retryMsg}>🔄 もう一度チャレンジ！</div>
          </div>
        )}
      </div>
    </div>
  );
}

const DK = window.innerWidth >= 768; // デスクトップ判定
const S={
  root:{minHeight:"100vh",background:"#0d0d18",fontFamily:"'Noto Serif JP',serif",color:"#e8dcc8",position:"relative",paddingBottom:32},
  center:{display:"flex",justifyContent:"center",alignItems:"center",minHeight:"100vh",padding:DK?32:16},
  flashOverlay:{position:"fixed",inset:0,pointerEvents:"none",zIndex:50},
  card:{background:"#13132a",border:"1px solid #252542",borderRadius:DK?26:22,padding:DK?"40px 40px":"26px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:DK?18:13,maxWidth:DK?680:400,width:"100%",textAlign:"center"},
  logo:{fontSize:DK?46:32,letterSpacing:4,color:"#c9a84c",fontWeight:900,borderBottom:"2px solid #c9a84c",paddingBottom:DK?8:5},
  title:{fontSize:DK?34:24,fontWeight:900,color:"#ece8d8"},
  sub:{fontSize:DK?15:11,color:"#777",lineHeight:1.7},
  badges:{display:"flex",gap:DK?8:5,flexWrap:"wrap",justifyContent:"center"},
  badge:{background:"#1e1e36",border:"1px solid #333",borderRadius:20,padding:DK?"5px 14px":"3px 9px",fontSize:DK?13:10,color:"#888"},
  btnG:{background:"#c9a84c",color:"#0d0d18",border:"none",borderRadius:DK?14:12,padding:DK?"16px 48px":"12px 30px",fontSize:DK?18:15,fontWeight:800,cursor:"pointer",fontFamily:"inherit",letterSpacing:0.5},
  statsRow:{display:"flex",gap:DK?28:18},
  stat:{textAlign:"center"},
  statN:{fontSize:DK?28:21,fontWeight:800,color:"#c9a84c"},
  statL:{fontSize:DK?13:10,color:"#555"},
  top:{padding:DK?"16px 24px 0":"12px 16px 0"},
  prog:{height:DK?4:3,background:"#1e1e32",borderRadius:2,overflow:"hidden",marginBottom:DK?14:10},
