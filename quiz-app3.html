              <button onClick={()=>{setDeckDialog(null);onPlayDeck(deckDialog,true);}}
                style={{background:"#1e1e36",border:"1px solid #4a4a7a",borderRadius:12,padding:"14px",
                  fontSize:DK?16:14,fontWeight:800,color:"#ece8d8",cursor:"pointer",
                  fontFamily:"inherit",textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:22}}>📖</span>
                <div>
                  <div>初回確認モード</div>
                  <div style={{fontSize:11,fontWeight:400,color:"#888",marginTop:2}}>正解を自動表示して確認</div>
                </div>
              </button>
              <button onClick={()=>setDeckDialog(null)}
                style={{background:"none",border:"none",color:"#555",fontSize:13,
                  cursor:"pointer",fontFamily:"inherit",marginTop:2}}>
                キャンセル
              </button>
            </div>
          </div>
        )}
        {decks.map(dk=>{
          const dueCount=countDue(dk.questions,srs);
          return(
            <button key={dk.id} onClick={()=>setDeckDialog(dk)}
              style={{background:"#13132a",border:"1px solid #252542",borderRadius:14,
                padding:"14px 16px",cursor:"pointer",fontFamily:"inherit",
                textAlign:"left",transition:"all 0.15s",width:"100%"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:22}}>📚</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:DK?16:14,fontWeight:700,color:"#ece8d8",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {dk.name}
                  </div>
                  <div style={{fontSize:11,color:"#666",marginTop:2}}>
                    {dk.questions.length}問 · 出題順
                  </div>
                </div>
                {dueCount>0&&<div style={{background:"rgba(201,168,76,0.2)",color:"#c9a84c",
                  borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:700,flexShrink:0}}>
                  {dueCount}due
                </div>}
              </div>
            </button>
          );
        })}

        {/* 続きから再開 */}
        {savedGame&&(
          <div style={{background:"#0a1a0a",border:"1px solid #22c55e",borderRadius:12,padding:"12px 14px"}}>
            <div style={{fontSize:12,color:"#4ade80",fontWeight:700,marginBottom:4}}>⏸ 続きのゲームがあります</div>
            <div style={{fontSize:11,color:"#666",marginBottom:8}}>
              {new Date(savedGame.savedAt).toLocaleDateString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})} 中断
              · {savedGame.state.answeredCorrectly?.length||0}/{savedGame.QS?.length||0}問 · {savedGame.state.score}pt
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={onResume}
                style={{flex:1,background:"#22c55e",border:"none",borderRadius:8,
                  padding:"8px 0",fontSize:13,fontWeight:800,color:"#0d0d18",cursor:"pointer",fontFamily:"inherit"}}>
                ▶ 続きから再開
              </button>
              <button onClick={onClearSave}
                style={{background:"none",border:"1px solid #333",borderRadius:8,padding:"8px 12px",
                  fontSize:12,color:"#555",cursor:"pointer",fontFamily:"inherit"}}>✕</button>
            </div>
          </div>
        )}
        {/* ボタン行 */}
        <div style={{display:"flex",gap:8,marginTop:4}}>
          <button onClick={onManageDecks}
            style={{flex:1,background:"#1e1e36",border:"1px solid #333",borderRadius:10,
              padding:"10px 0",fontSize:12,color:"#aaa",cursor:"pointer",fontFamily:"inherit"}}>
            📚 デッキ管理
          </button>
          <button onClick={()=>onSettings("stats")}
            style={{flex:1,background:"#1e1e36",border:"1px solid #333",borderRadius:10,
              padding:"10px 0",fontSize:12,color:"#aaa",cursor:"pointer",fontFamily:"inherit"}}>
            📊 問題別成績
          </button>
          <button onClick={()=>onSettings("io")}
            style={{flex:1,background:"#1e1e36",border:"1px solid #333",borderRadius:10,
              padding:"10px 0",fontSize:12,color:"#aaa",cursor:"pointer",fontFamily:"inherit"}}>
            📦 管理
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   APP
══════════════════════════════════════════════════════════════ */
function QuizApp(){
  const[QS,setQS]=useState(DEFAULT_QS);
  const[s,dispatch]=useReducer(reducer,makeInit(DEFAULT_QS));
  const{phase,queue,pendingQueue,score,combo,maxCombo,inputs,timeLeft,feedback,
        showHint,wrongCounts,questionKey,answeredCorrectly,attemptedIds,shuffled,firstTryCorrectCount,newPhaseStart,viewedNewCount,newCardIds}=s;
  const refs=useRef([]);
  const ghostingRef=useRef(false); // 自動タイプ中フラグ（FillInlineと共有）
  const[gSt,setGSt]=useState(()=>loadSt());
  const[rankUp,setRankUp]=useState(null);
  const[xpInfo,setXpInfo]=useState(null);
  const[showIO,setShowIO]=useState(false);
  const[showStats,setShowStats]=useState(false);
  const[showQManage,setShowQManage]=useState(false);
  const[savedGame,setSavedGame]=useState(()=>loadGame());
  // アニメーション用ステート
  const[correctAnim,setCorrectAnim]=useState(false);
  const[wrongAnim,setWrongAnim]=useState(false);
  const[comboAnim,setComboAnim]=useState(null);
  const[timerEdge,setTimerEdge]=useState(false);
  const[rankBurst,setRankBurst]=useState(null);
  // デッキ・SRS
  const[decks,setDecks]=useState(()=>loadDecks());
  const[srs,setSRS]=useState(()=>loadSRS());
  const[showDeckMgr,setShowDeckMgr]=useState(false);
  const[isToday,setIsToday]=useState(false); // 今日のデッキモード

  const MAX_SCORE=QS.reduce((a,q)=>a+q.pts,0);

  // ロビーへ戻る
  const goLobby=()=>{
    BGM.stop();VBGM.stop();
    dispatch({type:"BACK",QS});
  };
  // デッキを選んでプレイ
  const playDeck=(dk,introMode=false)=>{
    const freshSRS=loadSRS();
    // introMode=false（通常）は新規カードも自動入力なし
    // introMode=true のときのみ新規カードに自動入力を適用
    const newIds=introMode
      ? dk.questions.filter(q=>!freshSRS[q.id]).map(q=>q.id)
      : [];
    setQS(dk.questions);
    setIsToday(false);
    setRankUp(null);setXpInfo(null);
    clearGame();setSavedGame(null);
    try{getCtx().resume().catch(()=>{});}catch(_){}
    SFX.start();
    dispatch({type:"START",QS:dk.questions,newCardIds:newIds});
  };
  // 今日のデッキをプレイ
  const playToday=()=>{
    const freshSRS=loadSRS();
    const{review,newCards}=buildTodaysDeck(decks,freshSRS);
    // 今日のデッキ出題順：ミスあり（lapses>0）→ 通常due → 新カード（各グループ内はシャッフル）
    const withLapses=shuffle(review.filter(q=>(freshSRS[q.id]?.lapses||0)>0));
    const noLapses=shuffle(review.filter(q=>(freshSRS[q.id]?.lapses||0)===0));
    const combined=[...withLapses,...noLapses,...shuffle(newCards)];
    if(combined.length===0)return;
    setSRS(freshSRS);
    setQS(combined);
    setIsToday(true);
    setRankUp(null);setXpInfo(null);
    clearGame();setSavedGame(null);
    try{getCtx().resume().catch(()=>{});}catch(_){}
    SFX.start();
    const reviewCount=withLapses.length+noLapses.length;
    const newIds=newCards.map(q=>q.id);
    dispatch({type:"START",QS:combined,pendingStart:reviewCount||combined.length,newCardIds:newIds});
  };

  /* 完了時：XP + 問題別成績を保存 */
  useEffect(()=>{
    if(phase!=="complete"||!gSt)return;
    const ftc=firstTryCorrectCount,perfect=ftc===QS.length;
    const earned=calcXP({score,ftc,combo:maxCombo,perfect});
    setXpInfo({earned,scoreXP:score*3,ftcXP:ftc*2,comboXP:Math.min(maxCombo,10),perfectXP:perfect?30:0,ftc,perfect});

    // 問題別成績を更新
    const prevQS=gSt.questionStats||{};
    const newQS={...prevQS};
    QS.forEach(q=>{
      const prev=prevQS[q.id]||{sessions:0,firstTry:0,retryOk:0,wrong:0};
      const wasAnswered=answeredCorrectly.includes(q.id);
      const wc=wrongCounts[q.id]||0;
      const isFirstTry=wasAnswered&&wc===0;
      const isRetryOk=wasAnswered&&wc>0;
      newQS[q.id]={
        sessions: prev.sessions+(wasAnswered?1:0),
        firstTry: prev.firstTry+(isFirstTry?1:0),
        retryOk:  prev.retryOk+(isRetryOk?1:0),
        wrong:    prev.wrong+wc,
      };
    });

    const oldRank=getRank(gSt.totalXP),newXP=gSt.totalXP+earned,newRank=getRank(newXP);
    const newSt={
      totalXP:newXP,plays:gSt.plays+1,
      bestScore:Math.max(gSt.bestScore,score),bestCombo:Math.max(gSt.bestCombo,maxCombo),
      history:[...gSt.history.slice(-9),{score,xp:earned,
        date:new Date().toLocaleDateString("ja-JP",{month:"numeric",day:"numeric"})}],
      questionStats:newQS,
    };
    setGSt(newSt);saveSt(newSt);
    clearGame();setSavedGame(null);

    // SRS更新
    let newSRS={...srs};
    QS.forEach(q=>{
      const wc=wrongCounts[q.id]||0;
      const wasAnswered=answeredCorrectly.includes(q.id);
      if(wasAnswered&&wc===0){
        // 一発正解 → 通常SRS（間隔を伸ばす）
        newSRS=updateSRS(newSRS,q.id,true);
      }else if(wc>0){
        // 1回でも間違えた → nextDue=今日（正解していても今日のデッキに再出題）
        newSRS=updateSRSPause(newSRS,q.id);
      }
    });
    setSRS(newSRS);saveSRS(newSRS);
    if(newRank.name!==oldRank.name){
      setRankUp({from:oldRank,to:newRank});
      setTimeout(SFX.rankUp,900);
      // ランクバーストアニメ
      setTimeout(()=>{setRankBurst(newRank);setTimeout(()=>setRankBurst(null),1200);},800);
    }
    // 新規カードのみのデッキ（score=0でも全部見た）は勝利音
    const allNew=QS.every(q=>newCardIds&&newCardIds.has(q.id));
    setTimeout(()=>(allNew||score>=MAX_SCORE*0.7)?SFX.win():SFX.lose(),500);
  },[phase]);

  const q=phase==="feedback"&&feedback?QS.find(qq=>qq.id===feedback.qId):(queue.length>0?QS[queue[0]]:null);
  const dq=q&&shuffled&&q.type==="mc"?{...q,...shuffled}:q;
  const wrongCount=q?(wrongCounts[q.id]||0):0;
  const isFB=phase==="feedback";
  const isNew=q&&newCardIds?newCardIds.has(q.id):false; // 新規カード判定
  const maxT=qTimer(q||QS[0]);
  const timerPct=timeLeft/maxT*100;
  const timerColor=timeLeft<=5?"#ef4444":timeLeft<=10?"#f97316":"#c9a84c";

  useEffect(()=>{
    if(phase!=="question")return;
    const id=setInterval(()=>dispatch({type:"TICK"}),1000);
    return()=>clearInterval(id);
  },[questionKey]);
  useEffect(()=>{
    if(phase!=="question")return;
    if(timeLeft<=5&&timeLeft>0){SFX.tick();setTimerEdge(true);}
    else setTimerEdge(false);
    if(timeLeft===0)dispatch({type:"SUBMIT",correct:false,blankResults:null,QS});
  },[timeLeft]);
  useEffect(()=>{
    if(phase!=="feedback"||!feedback)return;
    if(isNew){
      // 新規カード：柔らかいチャイム音のみ
      SFX.newCard();
      return;
    }
    if(feedback.correct){
      SFX.correct();
      setCorrectAnim(true);
      setTimeout(()=>setCorrectAnim(false),700);
      if(combo===3){setTimeout(SFX.combo3,320);setComboAnim(combo);setTimeout(()=>setComboAnim(null),900);}
      else if(combo===5||combo===10){setTimeout(SFX.combo5,320);setComboAnim(combo);setTimeout(()=>setComboAnim(null),900);}
    }else{
      SFX.wrong();
      setWrongAnim(true);
      setTimeout(()=>setWrongAnim(false),500);
    }
  },[phase,feedback]);
  useEffect(()=>{
    if(phase!=="feedback")return;
    // 不正解 or 新規カード確認中 → 自動進行しない
    if(isFB&&feedback&&(!feedback.correct||isNew))return;
    const id=setTimeout(()=>dispatch({type:"NEXT",QS}),1900);
    return()=>clearTimeout(id);
  },[phase,questionKey]);
  useEffect(()=>{
    if(phase==="question"||phase==="feedback")BGM.start();
    else BGM.stop();
    if(phase==="complete") VBGM.start();
    else VBGM.stop();
  },[phase]);
  useEffect(()=>()=>{BGM.stop();VBGM.stop();},[]);


  // 新カードフェーズ開始通知を自動消去
  useEffect(()=>{
    if(!newPhaseStart)return;
    const id=setTimeout(()=>dispatch({type:"CLEAR_NEW_PHASE",QS}),2200);
    return()=>clearTimeout(id);
  },[newPhaseStart]);
  useEffect(()=>{
    if(phase!=="question"&&phase!=="feedback")return;
    const seen=(answeredCorrectly.length||0)+(viewedNewCount||0);
    const ratio=QS.length>0?seen/QS.length:0;
    const lv=ratio>=0.75?3:ratio>=0.5?2:ratio>=0.25?1:0;
    BGM.setLevel(lv);
  },[questionKey,answeredCorrectly.length,viewedNewCount]);
  // 不正解 or 新規カード確認中、Enterキーで次へ
  useEffect(()=>{
    if(!isFB||!feedback)return;
    if(feedback.correct&&!isNew)return;
    const handler=(e)=>{
      if(e.key==="Enter"&&!e.isComposing&&e.keyCode!==229) dispatch({type:"NEXT",QS});
    };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[isFB,feedback,isNew]);
  // 穴埋め問題中、どの空欄にもフォーカスしていない時にEnterで1つ目にフォーカス
  useEffect(()=>{
    if(phase!=="question"||isFB||q?.type!=="fill")return;
    const handler=(e)=>{
      if(e.key!=="Enter")return;
      if(e.isComposing||e.keyCode===229)return; // IME変換中は無視
      if(ghostingRef.current)return; // 自動タイプ中はEnter無効
      const focused=refs.current.some(r=>r&&r===document.activeElement);
      if(!focused&&refs.current[0]){
        e.preventDefault();
        refs.current[0].focus();
      }
    };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[phase,isFB,questionKey]);
  // 新規カード・MC：3秒後に自動で正解を送信
  useEffect(()=>{
    if(!isNew||isFB||q?.type!=="mc"||phase!=="question")return;
    const id=setTimeout(()=>submitMC(dq.ans),3000);
    return()=>clearTimeout(id);
  },[questionKey,isNew,phase]);

  const submitFill=()=>{
    if(phase!=="question"||!q)return;
    const r=chkFill(q.blanks,inputs);
    dispatch({type:"SUBMIT",correct:r.every(Boolean),blankResults:r,QS});
  };
  const submitMC=(idx)=>{
    if(phase!=="question"||!dq)return;
    dispatch({type:"SUBMIT",correct:idx===dq.ans,blankResults:null,QS});
  };
  const doStart=()=>{
    try{getCtx().resume().catch(()=>{});}catch(_){}
    SFX.start();setRankUp(null);setXpInfo(null);
    clearGame();setSavedGame(null);
    dispatch({type:"START",QS});
  };
  const doResume=()=>{
    if(!savedGame)return;
    try{getCtx().resume().catch(()=>{});}catch(_){}
    SFX.start();setRankUp(null);setXpInfo(null);
    setQS(savedGame.QS);
    dispatch({type:"RESUME",state:savedGame.state,QS:savedGame.QS});
  };
  const doPause=()=>{
    // 中断時：それまでの回答をSRS・成績に即時保存
    if(gSt){
      // 問題別成績を更新
      const prevQS=gSt.questionStats||{};
      const newQStat={...prevQS};
      QS.forEach(q=>{
        const wasAnswered=answeredCorrectly.includes(q.id);
        const wc=wrongCounts[q.id]||0;
        if(!wasAnswered&&wc===0)return; // 未回答は除外
        const prev=prevQS[q.id]||{sessions:0,firstTry:0,retryOk:0,wrong:0};
        const isFirstTry=wasAnswered&&wc===0;
        const isRetryOk=wasAnswered&&wc>0;
        newQStat[q.id]={
          sessions: prev.sessions+(wasAnswered?1:0),
          firstTry: prev.firstTry+(isFirstTry?1:0),
          retryOk:  prev.retryOk+(isRetryOk?1:0),
          wrong:    prev.wrong+wc,
        };
      });
      const newSt={...gSt,questionStats:newQStat};
      setGSt(newSt);saveSt(newSt);

      // SRS更新
      let newSRS={...srs};
      QS.forEach(q=>{
        const wc=wrongCounts[q.id]||0;
        if(answeredCorrectly.includes(q.id)){
          newSRS=updateSRS(newSRS,q.id,wc===0);
        }else if(wc>0){
          // 間違えたが未正解で中断 → 今日再出題
          newSRS=updateSRSPause(newSRS,q.id);
        }
      });
      setSRS(newSRS);saveSRS(newSRS);
    }
    saveGame(s,QS);
    setSavedGame(loadGame());
    dispatch({type:"BACK",QS});
  };

  /* ── ロビー画面 ─────────────────────────────────────────────── */
  if(phase==="start"){
    return(
      <div>
        {showDeckMgr&&<DeckManagerPanel decks={decks} setDecks={setDecks} QS={QS}
          onClose={()=>setShowDeckMgr(false)}/>}
        {showStats&&<StatsPanel QS={QS} gSt={gSt} onClose={()=>setShowStats(false)}/>}
        {showIO&&<IOPanel QS={QS} setQS={setQS} gSt={gSt} setGSt={setGSt}
          decks={decks} setDecks={setDecks} srs={srs} setSRS={setSRS}
          onClose={()=>setShowIO(false)}/>}
        {showQManage&&<QManagePanel QS={QS} setQS={setQS} onClose={()=>setShowQManage(false)}/>}
        <Lobby
          decks={decks} srs={srs} gSt={gSt}
          onPlayDeck={playDeck}
          onPlayToday={playToday}
          onManageDecks={()=>setShowDeckMgr(true)}
          onSettings={(t)=>{
            if(t==="stats") setShowStats(true);
            if(t==="io") setShowIO(true);
          }}
          savedGame={savedGame}
          onResume={doResume}
          onClearSave={()=>{clearGame();setSavedGame(null);}}
        />
      </div>
    );
  }

  /* ── 完了画面 ─────────────────────────────────────────────── */
  if(phase==="complete"){
    const newRankObj=gSt?getRank(gSt.totalXP):null;
    const isBest=gSt&&score>0&&score===gSt.bestScore&&gSt.plays>1;
    return(
      <div style={S.root}>
        <div style={S.center}>
          <div style={{...S.card,gap:12,maxWidth:400}}>
            <div style={{fontSize:40,animation:"bounceIn 0.6s ease"}}>
              {score/MAX_SCORE>=0.9?"🏆":score/MAX_SCORE>=0.7?"⚔️":score/MAX_SCORE>=0.5?"🌾":"🗾"}
            </div>
            <div style={{display:"flex",alignItems:"baseline",gap:4}}>
              <span style={{fontSize:50,fontWeight:900,color:scoreColor(score)}}>{score}</span>
              <span style={{fontSize:17,color:"#555",alignSelf:"flex-end",marginBottom:7}}>/{MAX_SCORE}点</span>
            </div>
            <div style={S.statsRow}>
              <div style={S.stat}><div style={{...S.statN,color:scoreColor(score)}}>{answeredCorrectly.length}/{QS.length}</div><div style={S.statL}>正解</div></div>
              <div style={S.stat}><div style={S.statN}>{xpInfo?.ftc||0}/{QS.length}</div><div style={S.statL}>一発正解</div></div>
              <div style={S.stat}><div style={{...S.statN,color:"#f97316"}}>{maxCombo}</div><div style={S.statL}>最大コンボ</div></div>
            </div>
            {xpInfo&&(
              <div style={{width:"100%",background:"#0d0d20",borderRadius:12,padding:"12px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontSize:12,color:"#aaa"}}>今回の獲得XP</span>
                  <span style={{fontSize:16,fontWeight:800,color:"#c9a84c"}}>+{xpInfo.earned} XP</span>
                </div>
                {[
                  [`得点 ${score}pt × 3`,xpInfo.scoreXP],
                  [`一発正解 ${xpInfo.ftc}問 × 2`,xpInfo.ftcXP],
                  [`コンボボーナス`,xpInfo.comboXP],
                  xpInfo.perfect?[`全問一発正解ボーナス 🎉`,xpInfo.perfectXP]:null,
                ].filter(Boolean).map(([label,val])=>(
                  <div key={label} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#555",marginBottom:3}}>
                    <span>{label}</span><span style={{color:"#777"}}>+{val}</span>
                  </div>
                ))}
                <div style={{borderTop:"1px solid #2a2a3a",marginTop:10,paddingTop:10}}>
                  {gSt&&<XpBar totalXP={gSt.totalXP}/>}
                </div>
              </div>
            )}
            {isBest&&<div style={{background:"rgba(240,192,64,0.1)",border:"1px solid #f0c040",
              borderRadius:10,padding:"7px 14px",fontSize:12,color:"#f0c040",animation:"bounceIn 0.5s ease"}}>
              🏆 自己ベスト更新！
            </div>}
            {isToday&&xpInfo&&(
              <div style={{background:"rgba(34,197,94,0.08)",border:"1px solid #22c55e",
                borderRadius:10,padding:"8px 14px",fontSize:12,color:"#4ade80",textAlign:"center"}}>
                📅 今日のデッキ完了！SRS更新済み
              </div>
            )}
            {rankUp&&(
              <div style={{width:"100%",background:"rgba(255,255,255,0.03)",
                border:`2px solid ${rankUp.to.color}`,borderRadius:14,
                padding:"12px",textAlign:"center",animation:"rankUpAnim 0.6s ease"}}>
                <div style={{fontSize:10,letterSpacing:3,color:"#aaa",marginBottom:6}}>⬆ 昇　格</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                  <span style={{fontSize:13,color:rankUp.from.color}}>{rankUp.from.icon} {rankUp.from.name}</span>
                  <span style={{color:"#555",fontSize:16}}>→</span>
                  <span style={{fontSize:17,fontWeight:800,color:rankUp.to.color}}>{rankUp.to.icon} {rankUp.to.name}</span>
                </div>
              </div>
            )}
            {newRankObj&&<div style={{fontSize:11,color:"#555"}}>
              現在の称号：<span style={{color:newRankObj.color,fontWeight:700}}>{newRankObj.icon} {newRankObj.name}</span>
            </div>}
            <div style={{display:"flex",gap:8,width:"100%"}}>
              <button style={{...S.btnG,flex:1}} onClick={doStart}>もう一度</button>
              <button onClick={goLobby}
                style={{background:"none",border:"1px solid #2a2a44",color:"#888",
                  borderRadius:12,padding:"12px 16px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>🏠</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  if(!q||!dq)return null;

  /* ── 問題画面 ─────────────────────────────────────────────── */
  return(
    <div style={S.root}>
      {/* 既存フィードバックフラッシュ */}
      {isFB&&<div className="flashFade" style={{...S.flashOverlay,
        background:isNew?"rgba(201,168,76,0.12)":feedback?.correct?"rgba(34,197,94,0.18)":"rgba(239,68,68,0.42)",
        animationDuration:"1.9s"}}/>}
      {/* 新カードフェーズ開始通知 */}
      {newPhaseStart&&(
        <div style={{position:"fixed",top:"30%",left:0,right:0,
          display:"flex",justifyContent:"center",pointerEvents:"none",zIndex:80,
          animation:"slideUp 0.5s ease"}}>
          <div style={{background:"rgba(96,165,250,0.18)",border:"1px solid #60a5fa",
            borderRadius:14,padding:"12px 28px",textAlign:"center"}}>
            <div style={{fontSize:DK?18:15,fontWeight:800,color:"#60a5fa"}}>🆕 新しい問題</div>
            <div style={{fontSize:DK?13:11,color:"#888",marginTop:3}}>復習完了！未出題の問題へ</div>
          </div>
        </div>
      )}
      {correctAnim&&(
        <div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",
          justifyContent:"center",pointerEvents:"none",zIndex:60}}>
          <div style={{width:150,height:150,borderRadius:"50%",
            border:"5px solid #4ade80",
            animation:"correctRing 0.65s ease-out forwards"}}/>
        </div>
      )}
      {/* 不正解：画面縁が赤く光る */}
      {wrongAnim&&(
        <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:60,
          boxShadow:"inset 0 0 70px rgba(239,68,68,0.75)",
          animation:"wrongFlash 0.5s ease forwards"}}/>
      )}
      {/* コンボ：数字が上に飛ぶ */}
      {comboAnim&&(
        <div style={{position:"fixed",top:"38%",left:0,right:0,textAlign:"center",
          pointerEvents:"none",zIndex:60,
          fontSize:DK?56:42,fontWeight:900,color:"#f97316",
          fontFamily:"'Noto Serif JP',serif",
          animation:"comboFloat 0.95s ease-out forwards"}}>
          🔥×{comboAnim}
        </div>
      )}
      {/* タイマー残り5秒：画面縁が赤くパルス */}
      {timerEdge&&(
        <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:55,
          animation:"edgePulse 0.5s ease infinite"}}/>
      )}
      {/* ランク昇格：アイコンが大きく出てフェード */}
      {rankBurst&&(
        <div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",
          justifyContent:"center",pointerEvents:"none",zIndex:70}}>
          <div style={{fontSize:110,animation:"rankBurst 1.2s ease-out forwards"}}>
            {rankBurst.icon}
          </div>
        </div>
      )}
      <div style={S.top}>
        <DotMap QS={QS} queue={queue} pendingQueue={pendingQueue} answeredCorrectly={answeredCorrectly}
          attemptedIds={attemptedIds} wrongCounts={wrongCounts} phase={phase}/>
        <div style={S.topRow}>
          <span style={S.qnum}>✓{answeredCorrectly.length}<span style={{color:"#444",fontSize:10}}>/{QS.length}</span></span>
          {combo>0&&<span className="comboPop" style={S.comboTag}>{"🔥".repeat(Math.min(combo,5))} ×{combo}</span>}
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={S.scorePill}>{score}<span style={{color:"#444",fontSize:10}}>pt</span></span>
            <button onClick={doPause}
              style={{background:"none",border:"1px solid #2a2a44",borderRadius:7,
                padding:DK?"4px 12px":"3px 9px",fontSize:DK?13:10,color:"#666",
                cursor:"pointer",fontFamily:"inherit"}}>
              ⏸ 中断
            </button>
          </div>
        </div>
      </div>
      <div style={S.timerW}>
        <div style={{...S.timerF,width:`${timerPct}%`,background:timerColor,
          animation:phase==="question"&&timeLeft<=5?"timerPulse 0.5s ease infinite":"none"}}/>
        <span style={{...S.timerN,color:timerColor}}>{phase==="question"?`${timeLeft}s`:""}</span>
      </div>
      <div style={S.qcard}
        className={isFB&&!isNew&&!feedback?.correct?"shake":""}
        onClick={()=>{
          if(isFB&&feedback&&(!feedback.correct||isNew)) dispatch({type:"NEXT",QS});
        }}>
        <div style={S.qmeta}>
          {q.type==="fill"?"穴埋め":"選択式"} · {q.pts}点
          {wrongCount>0&&<span style={{color:"#f97316",marginLeft:8,fontSize:11}}>🔄 再挑戦 {wrongCount}回目</span>}
          {q.type==="fill"&&!isFB&&<span style={{color:"#555",marginLeft:8,fontSize:10}}>← タップして入力</span>}
        </div>
        {q.type==="mc"?<TypewriterText text={dq.q} qkey={questionKey} style={S.qtxt}/>
          :<FillInline key={questionKey} q={q} qkey={questionKey} isNew={isNew&&!isFB} inputs={inputs} dispatch={dispatch}
              isFB={isFB} feedback={feedback} refs={refs} onSubmit={submitFill} ghostingRef={ghostingRef}/>}
        {!showHint&&!isFB&&<button style={S.hintBtn} onClick={()=>dispatch({type:"HINT"})}>💡 ヒント</button>}
        {q.type==="fill"&&!isFB&&(
          <button style={{...S.btnG,marginTop:10,padding:"10px 28px",fontSize:14}}
            onClick={submitFill} disabled={inputs.some(v=>!v.trim())}>回答する ✓</button>
        )}
        {showHint&&<div style={S.hintBox}>💡 {q.hint}</div>}
        {q.type==="mc"&&(
          <div style={S.optG}>
            {dq.opts.map((opt,i)=>{
              // 新規カード：正解ボタンを薄く金色にハイライト（2秒後）
              const isCorrectOpt=i===dq.ans;
              const ghostHL=isNew&&!isFB&&isCorrectOpt;
              return(
                <button key={i} onClick={()=>submitMC(i)} disabled={isFB}
                  style={{...S.optBtn,
                    background:isFB&&isCorrectOpt?"rgba(34,197,94,0.2)":ghostHL?"rgba(201,168,76,0.12)":"#1a1a2e",
                    border:`1px solid ${isFB&&isCorrectOpt?"#22c55e":ghostHL?"rgba(201,168,76,0.4)":"#2a2a42"}`}}>
                  <span style={S.optL}>{["A","B","C","D"][i]}</span>
                  <span style={{...S.optT,color:ghostHL?"rgba(201,168,76,0.7)":"inherit"}}>{opt}</span>
                </button>
              );
            })}
          </div>
        )}

        {isFB&&isNew&&(
          <div style={{marginTop:12}}>
            <div style={{display:"flex",alignItems:"center",gap:8,
              padding:"10px 14px",background:"rgba(201,168,76,0.1)",
              border:"1px solid #c9a84c",borderRadius:10,flexWrap:"wrap",marginBottom:8}}>
              <span style={{fontSize:20}}>📖</span>
              <span style={{color:"#c9a84c",fontWeight:700,fontSize:15}}>初回確認</span>
              <span style={{color:"#777",fontSize:12,marginLeft:4}}>次回から本番です</span>
            </div>
            <button onClick={()=>dispatch({type:"NEXT",QS})}
              style={{background:"#1e1e36",border:"1px solid #3a3a58",
                borderRadius:9,padding:"8px 20px",fontSize:DK?14:12,color:"#aaa",
                cursor:"pointer",fontFamily:"inherit",width:"100%"}}>
              次へ →
            </button>
          </div>
        )}
        {isFB&&!isNew&&feedback?.correct&&(
          <div style={S.correctBanner}>
            <span style={{fontSize:22}}>⭕</span>
            <span style={{color:"#4ade80",fontWeight:700,fontSize:15}}>正解！</span>
            {feedback.isFirst
              ?<span style={{color:"#c9a84c",fontWeight:700,fontSize:13,marginLeft:4}}>+{q.pts}pt</span>
              :<span style={{color:"#777",fontSize:12,marginLeft:4}}>再挑戦正解（加点なし）</span>}
            {combo>=3&&<span className="comboPop" style={{color:"#f97316",fontWeight:700,marginLeft:4}}>🔥{combo}コンボ！</span>}
          </div>
        )}
        {isFB&&!isNew&&feedback?.correct&&q.explanation&&(
          <div style={S.explanationBox}>{q.explanation}</div>
        )}
        {isFB&&!isNew&&!feedback?.correct&&(
          <div style={S.wrongReveal}>
            <div style={S.wrongTop}>
              <span style={{fontSize:20}}>❌</span>
              <span style={{fontSize:15,fontWeight:700,color:"#f87171"}}>不正解</span>
            </div>
            <div style={S.correctLabel}>正　解</div>
            <div style={S.correctBlock}>
              {feedback.correctAns.map((ans,i)=>(
                <div key={i} style={S.correctAnsRow}>
                  {q.blanks&&q.blanks.length>1&&<span style={{fontSize:12,color:"#888",marginRight:4}}>（{i+1}）</span>}
                  <span style={S.correctAns}>{ans}</span>
                </div>
              ))}
            </div>
            {q.explanation&&<div style={S.explanationBox}>{q.explanation}</div>}
            <div style={S.retryMsg}>🔄 もう一度チャレンジ！</div>
            <button onClick={()=>dispatch({type:"NEXT",QS})}
              style={{marginTop:10,background:"#1e1e36",border:"1px solid #3a3a58",
                borderRadius:9,padding:"8px 20px",fontSize:DK?14:12,color:"#aaa",
                cursor:"pointer",fontFamily:"inherit",width:"100%"}}>
              次へ →
            </button>
          </div>
        )}
      </div>

    </div>
  );
}

const S={
  root:{minHeight:"100vh",background:"#0d0d18",fontFamily:"'Noto Serif JP',serif",color:"#e8dcc8",position:"relative",paddingBottom:32},
  center:{display:"flex",justifyContent:"center",alignItems:"center",minHeight:"100vh",padding:DK?32:16},
  flashOverlay:{position:"fixed",inset:0,pointerEvents:"none",zIndex:50},
  card:{background:"#13132a",border:"1px solid #252542",borderRadius:DK?26:22,padding:DK?"40px 40px":"26px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:DK?18:13,maxWidth:DK?680:400,width:"100%",textAlign:"center"},
  logo:{fontSize:DK?46:32,letterSpacing:4,color:"#c9a84c",fontWeight:900,borderBottom:"2px solid #c9a84c",paddingBottom:DK?8:5},
  title:{fontSize:DK?34:24,fontWeight:900,color:"#ece8d8"},
  sub:{fontSize:DK?15:11,color:"#777",lineHeight:1.7},
  badges:{display:"flex",gap:DK?8:5,flexWrap:"wrap",justifyContent:"center"},
  badge:{background:"#1e1e36",border:"1px solid #333",borderRadius:20,padding:DK?"5px 14px":"3px 9px",fontSize:DK?13:10,color:"#888"},
  btnG:{background:"#c9a84c",color:"#0d0d18",border:"none",borderRadius:DK?14:12,padding:DK?"16px 48px":"12px 30px",fontSize:DK?18:15,fontWeight:800,cursor:"pointer",fontFamily:"inherit",letterSpacing:0.5},
  statsRow:{display:"flex",gap:DK?28:18},
  stat:{textAlign:"center"},
  statN:{fontSize:DK?28:21,fontWeight:800,color:"#c9a84c"},
  statL:{fontSize:DK?13:10,color:"#555"},
  top:{padding:DK?"16px 24px 0":"12px 16px 0"},
  prog:{height:DK?4:3,background:"#1e1e32",borderRadius:2,overflow:"hidden",marginBottom:DK?14:10},
  progF:{height:"100%",background:"#c9a84c",transition:"width 0.5s ease"},
  topRow:{display:"flex",justifyContent:"space-between",alignItems:"center"},
  qnum:{fontSize:DK?17:13,color:"#c9a84c",fontWeight:700},
  comboTag:{fontSize:DK?17:13,color:"#f97316",fontWeight:700},
  scorePill:{fontSize:DK?17:13,color:"#c9a84c",fontWeight:700},
  timerW:{position:"relative",margin:DK?"10px 24px":"8px 16px",height:DK?7:5,background:"#1e1e32",borderRadius:3},
  timerF:{height:"100%",borderRadius:3,transition:"width 1s linear, background 0.5s"},
  timerN:{position:"absolute",right:0,top:DK?-22:-18,fontSize:DK?13:10,fontWeight:700},
  qcard:{margin:DK?"16px 24px 0":"12px 14px 0",background:"#13132a",border:"1px solid #252542",borderRadius:DK?20:16,padding:DK?"28px 28px":"18px 16px",animation:"slideUp 0.3s ease"},
  qmeta:{fontSize:DK?14:11,color:"#555",marginBottom:DK?14:10,letterSpacing:0.5},
  qtxt:{fontSize:DK?21:16,lineHeight:DK?1.8:1.9,fontWeight:700,marginBottom:DK?18:12,color:"#ece8d8"},
  hintBtn:{background:"none",border:"1px solid #2a2a42",color:"#666",borderRadius:8,padding:DK?"7px 16px":"5px 12px",fontSize:DK?14:11,cursor:"pointer",marginBottom:DK?16:12},
  hintBox:{background:"#1a1a36",border:"1px solid #353558",borderRadius:8,padding:DK?"10px 16px":"8px 12px",fontSize:DK?15:12,color:"#aaa",marginBottom:DK?16:12},
  optG:{display:"flex",flexDirection:"column",gap:DK?10:7},
  optBtn:{display:"flex",alignItems:"center",gap:DK?14:10,borderRadius:DK?12:10,padding:DK?"15px 18px":"11px 13px",textAlign:"left",color:"#e8dcc8",width:"100%",transition:"background 0.12s",border:"1px solid"},
  optL:{minWidth:DK?28:22,height:DK?28:22,borderRadius:"50%",background:"#252546",display:"flex",alignItems:"center",justifyContent:"center",fontSize:DK?13:10,fontWeight:700,color:"#666",flexShrink:0},
  optT:{fontSize:DK?17:13,lineHeight:1.5},
  correctBanner:{display:"flex",alignItems:"center",gap:DK?12:8,marginTop:DK?16:12,padding:DK?"13px 18px":"10px 14px",background:"rgba(34,197,94,0.1)",border:"1px solid #22c55e",borderRadius:DK?12:10,flexWrap:"wrap"},
  wrongReveal:{marginTop:DK?20:16,padding:DK?"22px":"16px",background:"rgba(15,5,5,0.9)",border:"2px solid #ef4444",borderRadius:DK?18:14,animation:"wrongReveal 0.35s ease",textAlign:"center"},
  wrongTop:{display:"flex",alignItems:"center",justifyContent:"center",gap:DK?12:8,marginBottom:DK?16:12},
  correctLabel:{fontSize:DK?13:10,letterSpacing:4,color:"#c9a84c",marginBottom:DK?14:10,textTransform:"uppercase"},
  correctBlock:{display:"flex",flexDirection:"column",gap:DK?6:4,alignItems:"center",marginBottom:DK?14:10},
  correctAnsRow:{display:"flex",alignItems:"center",gap:DK?10:6},
  correctAns:{fontSize:DK?38:28,fontWeight:900,color:"#f0c060",lineHeight:1.4},
  retryMsg:{fontSize:DK?15:12,color:"#aaa",borderTop:"1px solid #2a2a3a",paddingTop:DK?14:10},
  explanationBox:{marginTop:10,padding:DK?"12px 16px":"9px 12px",background:"rgba(96,165,250,0.08)",border:"1px solid rgba(96,165,250,0.25)",borderRadius:10,fontSize:DK?14:12,color:"#93c5fd",lineHeight:1.7},
};

ReactDOM.createRoot(document.getElementById("root")).render(<QuizApp/>);
</script>
</body>
</html>
