const DEFAULT_QS_EN=[{"id":"s3q01a2f1","type":"fill","pts":1,"q":"The Chicago Board of Trade, founded in 1848, is widely cited as the birthplace of modern futures trading — where farmers could lock in grain prices before harvest. Financial historians have since identified an earlier precedent. In ___, Japan, rice merchants developed a market for forward contracts as early as the 1730s, trading rights to rice not yet harvested — making it arguably the world's first organised ___ exchange.","blanks":[{"ans":["Osaka","osaka"]},{"ans":["futures"]}],"hint":"A city in western Japan famous for commerce; the type of contract that locks in a future price.","explanation":"The Chicago Board of Trade, founded in 1848, is usually cited as the birthplace of modern futures trading. But the Dojima exchange predates it by about 120 years. Financial historians now increasingly recognise Dojima as the earliest known organised futures market in the world — one of the clearest examples of how 'the West came first' is not always true. (Okushi et al. 2025 pp.30–32)\n\nIn 1730, the Dojima Rice Exchange in Osaka was officially recognised by the shogunate as a public market. Merchants traded rice certificates — warehouse receipts promising future delivery — and also contracts for rice not yet harvested: a futures market in all but name. The shogunate backed the system because stable rice prices were essential to samurai, whose salaries were paid in rice. (Nakanishi 2023 pp.133–134)"},{"id":"s3q02b4c8","type":"fill","pts":1,"q":"The French Revolution abolished feudal grain dues in 1789, replacing harvest-dependent obligations with unified money taxes. Japan's Meiji government carried out a comparable transformation in 1873. The ___ Tax Reform ended the practice of paying obligations in rice — amounts that fluctuated with every harvest — and replaced them with a fixed levy of 3% of assessed land value, collected in ___. For the first time, Tokyo had a stable, monetised revenue stream to fund railways, factories, and armies.","blanks":[{"ans":["Land","land"]},{"ans":["cash"]}],"hint":"The thing being taxed; the form of payment that replaced rice.","explanation":"The French Revolution swept away feudal grain dues in 1789, replacing them with money taxes. Japan did the same thing 84 years later. The key difference: in Japan, the old ruling class was not abolished but compensated with government bonds — a bought-out transition rather than a revolutionary break. (Okushi et al. 2025 p.231; Kanai et al. 2010 p.120)\n\nThe Land Tax Reform of 1873 replaced Japan's feudal tax system. The old system required payment in rice, varied with each harvest, and differed from domain to domain. The new system assessed each plot of land at a fixed monetary value, with the owner paying 3% in cash annually. Land certificates were also issued, giving farmers legal title to their land for the first time. (Takeda 2019 pp.58–61; Miwa 2021 pp.38–42)"},{"id":"s3q03e7d3","type":"fill","pts":1,"q":"In the 1860s, a microscopic parasite devastated silkworm farms across France, Italy, and Spain — collapsing Europe's thread supply just as middle-class demand for luxury fabrics was surging. Louis Pasteur spent years finding a cure. Japan's sericulture industry was unaffected, and ___ became Japan's single most valuable export for six decades, at times accounting for over ___ percent of all export revenue and generating the foreign exchange that paid for imported machinery and expertise.","blanks":[{"ans":["silk"]},{"ans":["40","forty"]}],"hint":"Japan's top export fibre; the share of export revenue it represented.","explanation":"In the 1860s, pébrine devastated silkworm farms across France, Italy, and Spain. Louis Pasteur spent years finding the cause. With European supply collapsing and demand rising, Japanese silk filled the gap. A disease that destroyed European farms indirectly financed Japan's industrialisation — an irony rarely noted in textbooks. (Okushi et al. 2025 p.182; Miwa 2021 p.62)\n\nFrom the moment Japan opened its ports in 1859, raw silk became its most valuable export, regularly accounting for around 40% of total export revenue. Merchants in Yokohama shipped thread to mills in the US and Europe. The foreign currency earned from silk sales paid for imported machinery, railway materials, and the salaries of foreign engineers hired to build Japan's new industries. (Nakanishi 2023 pp.188–189; Takeda 2019 p.40)"},{"id":"s3q04f1a9","type":"fill","pts":1,"q":"In the 1880s, Lancashire's cotton mills dominated global yarn markets, and British merchants were confident Japan could not compete. They were wrong. The Osaka ___ Company, founded in 1882 with 10,500 spindles and steam power, ran day and night shifts and turned a profit in its first year. Within two decades, Japanese cotton ___ had displaced British imports across Asian markets and was being exported to China and India.","blanks":[{"ans":["Spinning","spinning"]},{"ans":["yarn"]}],"hint":"The industrial process of making thread; the product itself.","explanation":"In the 1880s, Lancashire's mills dominated global markets and British merchants were confident Japan posed no threat. They were wrong. Economic historians point to Japan's displacement of British cotton yarn in Asia as one of the earliest clear-cut examples of a late-developing country overtaking an established industrial power. (Francks 2015 p.84; Okushi et al. 2025 pp.221–222)\n\nThe Osaka Spinning Company, founded in 1882 with backing from Shibusawa Eiichi, ran 10,500 steam-powered spindles in two shifts and turned a profit in its very first year. That success triggered a wave of new companies across the country. By the early 1890s, Japan had gone from importing cotton yarn to exporting it. By the late 1890s, Japanese yarn was displacing British imports across Asian markets. (Miwa 2021 pp.61–62; Takeda 2019 pp.75–76)"},{"id":"s3q05c3b6","type":"fill","pts":1,"q":"After winning the Franco-Prussian War in 1871, Germany received a massive war payment from France — 5 billion francs — and used the windfall to join the international gold standard, instantly gaining credibility with European lenders. Japan executed the same two-step strategy after its 1895 war with China. The ___ China paid gave Japan enough sterling to back its currency, and in 1897 Japan formally adopted the ___ standard, opening the door to foreign bond markets just in time for the looming war with Russia.","blanks":[{"ans":["indemnity"]},{"ans":["gold"]}],"hint":"The payment a defeated country makes; the monetary system Japan joined.","explanation":"After the Franco-Prussian War, Germany received 5 billion francs from France and used that windfall to join the international gold standard — instantly gaining access to European capital markets. Japan followed exactly the same two-step playbook a quarter-century later. The parallel is almost too neat to be coincidental. (Okushi et al. 2025 p.186)\n\nThe 1895 Treaty of Shimonoseki required China to pay Japan an enormous indemnity — equivalent to about 311 million yen, much received in British pounds. Japan deposited this in London as currency reserve backing. In 1897 the Currency Act placed Japan on the gold standard, giving foreign investors confidence in Japanese government bonds and making it possible to borrow heavily on international markets — essential when the Russo-Japanese War began eight years later. (Miwa 2021 pp.74–76; Takeda 2019 pp.77–78)"},{"id":"s3q06d8e2","type":"fill","pts":1,"q":"In 1789, bread riots across France helped ignite the Revolution when wheat prices soared beyond what ordinary people could afford. Japan's equivalent erupted in the summer of 1918, when ___ prices more than doubled in a matter of months. Speculators had driven prices up anticipating massive army demand for Japan's military expedition into ___. The disturbances spread to over 300 cities, mobilised roughly two million people, and toppled the sitting Prime Minister.","blanks":[{"ans":["rice"]},{"ans":["Siberia"]}],"hint":"Japan's staple food; the region where the military expedition was headed.","explanation":"When bread prices soared in France in 1789, crowds marched to Versailles. The 1918 rice riots were Japan's equivalent. The key difference: France's crisis came from a bad harvest; Japan's came from speculation and military demand. The food was there — it was just being kept from the market. (Okushi et al. 2025 p.230; Miwa 2021 p.119)\n\nIn the summer of 1918, rice prices more than doubled in months. The trigger was the government's announcement of a Siberian expedition against the Bolshevik Revolution. Speculators, expecting massive army purchases, began hoarding rice. Protests spread from a Toyama fishing village to over 300 cities across Japan, involving perhaps two million people. Prime Minister Terauchi was forced to resign. (Nakanishi 2023 pp.233–235; Takeda 2019 pp.158–159)"},{"id":"s3q07a5f4","type":"fill","pts":1,"q":"Nazi Germany's Four-Year Plan of 1936 placed the entire economy under state control — directing investment, allocating materials, setting wages and prices — in pursuit of military self-sufficiency. Japan built a parallel apparatus. The National General ___ Law of 1938 gave the government sweeping power over labour, capital, and production. Economist Noguchi Yukio argued that this wartime framework — not the Allied occupation — created the template for Japan's postwar ___ state, including MITI, main banks, and lifetime employment.","blanks":[{"ans":["Mobilization","Mobilisation"]},{"ans":["developmental"]}],"hint":"What the law did to the economy; the type of state that emerged after the war.","explanation":"Nazi Germany's Four-Year Plan placed the entire economy under state direction — Japan's law did the same thing at nearly the same time. The crucial difference: in Germany, the wartime system collapsed with defeat and was rebuilt from scratch. In Japan, much of the wartime economic framework quietly continued into peacetime and shaped Japan's growth model for decades. (Okushi et al. 2025 p.313)\n\nThe National General Mobilization Law of 1938 gave the government sweeping powers without needing parliamentary approval. New institutions were built: long-term industrial banks, government-directed credit channels, and industry control associations. After the war, GHQ dismantled the military apparatus — but many economic institutions survived and became foundations of postwar industrial policy. Noguchi's '1940 system' thesis argues this continuity explains MITI, main banks, and lifetime employment. (Takeda 2019 pp.196–201; Miwa 2021 pp.150–155)"},{"id":"s3q08b9c1","type":"fill","pts":1,"q":"The Marshall Plan, which provided $13 billion to rebuild Western Europe between 1948 and 1952, is history's most celebrated economic recovery programme. Japan received no Marshall Plan. Its recovery was instead ignited by geography: when the ___ War broke out in June 1950, American forces needed a nearby manufacturing base, and Japanese factories suddenly had more orders than they could fill. This military ___ boom injected more dollars into Japan in three years than the entire Marshall Plan sent to Britain — launching a recovery that occupation-era reforms had prepared but not yet ignited.","blanks":[{"ans":["Korean"]},{"ans":["procurement"]}],"hint":"The war that began in June 1950; the term for military purchasing from civilian factories.","explanation":"The Marshall Plan gave Western Europe $13 billion to rebuild — history's most celebrated recovery programme. Japan received no Marshall Plan. Some historians put it bluntly: 'America did not give Japan its recovery. America purchased it.' Japan happened to be in the right place when a war started. (Okushi et al. 2025 p.323)\n\nWhen the Korean War broke out in June 1950, the US military urgently needed a nearby production base. American forces placed enormous orders with Japanese factories. By 1951, industrial output had recovered to prewar levels. Total US military procurement over three years exceeded $1 billion — more foreign currency per year than Britain received under the Marshall Plan. (Miwa 2021 pp.183–184; Takeda 2019 pp.335–336)"},{"id":"s3q09e4d7","type":"fill","pts":1,"q":"In postwar West Germany, large banks like Deutsche Bank held major stakes in industrial companies, sat on supervisory boards, and provided long-term financing — a 'house bank' system that tied finance and industry together. Japan evolved a similar structure after GHQ dissolved the old zaibatsu holding companies. Firms regrouped into loose ___ networks bound by cross-shareholding, with a designated '___ bank' at the centre serving as lender, monitor, and crisis backstop for all member companies.","blanks":[{"ans":["keiretsu"]},{"ans":["main"]}],"hint":"The Japanese term for these corporate networks; the adjective describing the central bank.","explanation":"Postwar West Germany developed a strikingly similar structure: large banks held equity in industrial companies, sat on supervisory boards, and provided long-term finance. Both Japan and Germany channelled capital through relationship banking rather than open markets. 'Managed capitalism' was a common postwar response to the failures of the 1930s, not a uniquely Japanese invention. (Okushi et al. 2025 pp.214–215)\n\nGHQ's postwar reforms dissolved zaibatsu holding companies and dispersed their shares. But former group companies did not stay scattered. Through the 1950s they regrouped around cross-shareholding and preferential lending, forming keiretsu networks. At the centre of each sat a main bank that provided not just loans but also monitoring, crisis management, and emergency rescue for member companies. (Takeda 2019 pp.356–358; Miwa 2021 pp.203–205)"},{"id":"s3q10f6a3","type":"fill","pts":1,"q":"France's postwar 'indicative planning' system — where the state set growth targets for key industries and directed bank credit toward them — was widely admired as a middle path between Soviet command planning and American laissez-faire. Japan's equivalent was even more hands-on. The Ministry of International Trade and ___, universally known by its acronym ___, wielded import licences, subsidised loans, and industry-wide negotiations to steer private investment into steel, petrochemicals, and consumer electronics.","blanks":[{"ans":["Industry","industry"]},{"ans":["MITI"]}],"hint":"The second word of the ministry's name; the famous four-letter acronym.","explanation":"France's postwar planification system used national plans to steer investment — widely admired as a middle road between Soviet planning and American free markets. MITI operated on similar logic but was more hands-on: it could restrict imports, direct credit, and negotiate capacity limits across entire industries. (Okushi et al. 2025 pp.329–330; Francks 2015 p.162)\n\nThe Ministry of International Trade and Industry, founded in 1949 and known as MITI, was the central coordinator of Japan's postwar industrial strategy. Steel, petrochemicals, shipbuilding, automobiles, and consumer electronics all benefited from MITI's targeted support at critical stages. Interestingly, later research suggested MITI's influence was weakest in Japan's most successful export sectors — raising the question of how much credit it actually deserves. (Miwa 2021 pp.185–187; Takeda 2019 pp.346–350)"},{"id":"s3q11c2b8","type":"fill","pts":2,"q":"When OPEC's 1973 oil embargo quadrupled crude prices, every oil-importing nation scrambled to adapt. Most Western European economies took years to bring energy consumption under control. Japan, which imported over 99% of its oil, had the most to lose — and adapted most dramatically. By ___, Japanese manufacturers had cut energy consumption per unit of industrial output by nearly 40% from its 1973 peak, a performance unmatched by any other major economy, transforming an acute vulnerability into a global competitive advantage in ___ -efficient products.","blanks":[{"ans":["1985"]},{"ans":["energy"]}],"hint":"The year by which the 40% reduction was achieved; the thing that was being used more efficiently.","explanation":"The first oil shock hit Western Europe just as hard, triggering recessions in Britain, France, and Italy. But when oil prices fell in the mid-1980s, the urgency of conservation faded in most Western countries. Japan maintained its focus, and the efficiency gains became a lasting competitive advantage. What began as Japan's greatest vulnerability became one of its greatest strengths. (Okushi et al. 2025 pp.337–338)\n\nThe 1973 OPEC oil embargo quadrupled crude prices almost overnight. Japan, importing over 99% of its oil, faced an existential manufacturing threat. The government enacted an Energy Conservation Law in 1979, and companies invested heavily in more efficient machinery, processes, and materials. By 1985, Japanese manufacturers were producing the same output using roughly 40% less energy per unit than in 1973 — unmatched by any other major economy. (Miwa 2021 pp.211–213; Takeda 2019 pp.402–405)"},{"id":"s3q12d1e5","type":"fill","pts":2,"q":"In September 1985, the finance ministers of the five largest economies met at New York's ___ Hotel and agreed to weaken the US dollar through coordinated market intervention. For Japan, the yen nearly doubled in value against the dollar within two years — from around 240 to under 130 — crushing export profits overnight. The government's response, flooding the economy with cheap credit to offset the shock, inadvertently inflated the land and stock-price ___ that would collapse spectacularly in 1990.","blanks":[{"ans":["Plaza","plaza"]},{"ans":["bubble"]}],"hint":"The hotel in New York where the G5 met; the word for an unsustainable asset price inflation.","explanation":"The Plaza Accord is celebrated as a landmark of international monetary cooperation. In practice, the unintended side effects were enormous. The cheap-money response in Japan, and a similar dynamic in Germany after reunification, both produced asset price booms that ended badly. 'Successful coordination' turned out to have a very high price tag. (Okushi et al. 2025 p.336)\n\nOn 22 September 1985, the G5 gathered at the Plaza Hotel in New York and agreed to push down the US dollar through coordinated intervention. For Japan, the yen roughly doubled against the dollar within two years. To prevent a deep recession, the Bank of Japan cut interest rates five times between 1986 and 1987, bringing the key rate to just 2.5%. Cheap money flooded into real estate and stocks, inflating the asset bubble that collapsed in 1990. (Miwa 2021 pp.218–220; Takeda 2019 pp.416–418)"},{"id":"s3q13a7f9","type":"fill","pts":2,"q":"Italy faces one of Europe's worst demographic crises: with a fertility rate of around 1.2 children per woman, its welfare state was never designed for such rapid ageing. Japan's situation is more extreme still. Japan's ___ rate has hovered near 1.2–1.3 for decades, and unlike Italy, Japan has historically accepted almost no immigration as a demographic buffer. The result: Japan's working-age population peaked in ___ and has been shrinking ever since — a structural drag on growth that no policy alone can fully reverse.","blanks":[{"ans":["fertility"]},{"ans":["1995"]}],"hint":"The demographic measure of average children per woman; the year Japan's working-age population peaked.","explanation":"Italy faces a similarly severe fertility crisis but benefits from EU labour mobility — workers from Eastern Europe and elsewhere. Japan has the same birth rate without that safety valve. Japan's demographic transition is happening faster and with fewer offsetting factors than in comparable European countries. In this sense, Japan is running the experiment that other ageing societies will face later. (Okushi et al. 2025 p.360)\n\nJapan's fertility rate first fell below 2.0 in 1974 and has stayed there ever since, hovering around 1.2–1.3 in recent decades. Japan's working-age population peaked at around 87 million in 1995 and has been shrinking ever since. Consequences are structural: a smaller workforce supports a larger retired population, pension and healthcare costs rise, and growth becomes harder to sustain. (Takeda 2019 pp.431–432; Nakanishi 2023 pp.398–399)"},{"id":"s3q14b3c4","type":"fill","pts":2,"q":"At the peak of the 1920s Florida land boom, swampland near Miami was selling for more than fertile Iowa farmland — prices completely disconnected from any realistic rental income. Japan's late-1980s asset bubble made Florida look modest. At its 1989 peak, the land beneath the ___ Palace grounds in central Tokyo was estimated to be worth more than the entire real-estate value of the state of ___ — based on assessed land prices in the surrounding district.","blanks":[{"ans":["Imperial","imperial"]},{"ans":["California"]}],"hint":"The royal residence in central Tokyo; the US state used for comparison.","explanation":"The 1920s Florida land boom — where swampland sold for more than productive farmland — is a classic example of prices disconnected from reality. But Florida's bubble was local and resolved quickly. Japan's bubble was nationwide, embedded in the banking system through trillions of yen in real-estate collateral loans. Its aftermath lasted not months but decades. Economists now regard it as one of the most damaging asset price collapses in modern history. (Okushi et al. 2025 p.306)\n\nJapan's late-1980s asset bubble produced extraordinary numbers. At the 1989 peak, calculations based on assessed land values suggested the Imperial Palace grounds — 1.15 sq km in central Tokyo — were theoretically worth more than all real estate in California. Land prices had completely detached from any reasonable rental income estimate. When the bubble burst in 1990, the resulting bad loans dragged the financial system into a decade-long crisis. (Takeda 2019 pp.424–426; Miwa 2021 pp.222–224)"},{"id":"s3q15e8d6","type":"fill","pts":2,"q":"In September 1931, Britain was forced off the gold standard after a run on sterling — ending a century of British monetary leadership. Japan had returned to gold just eighteen months earlier at an overvalued prewar parity, triggering a deflation that devastated exports and bankrupted thousands of firms. When Finance Minister ___ Korekiyo abandoned gold in December 1931 and launched deficit spending, Japan's recovery was startlingly swift — making it the first major economy to exit what Japanese historians call the '___ Depression.'","blanks":[{"ans":["Takahashi"]},{"ans":["Showa"]}],"hint":"The finance minister's family name; the Japanese era name for the 1930s depression.","explanation":"Britain was forced off the gold standard in September 1931 — ending a century of British monetary leadership. Japan followed three months later, but more decisively and with more expansionary follow-through. Takahashi's policies anticipated what Keynes would recommend and what FDR would implement in 1933. Tragically, Takahashi was assassinated in February 1936 when he tried to cut the military budget — the story of good economics meeting a bad political fate. (Okushi et al. 2025 pp.307–310; Nakanishi 2023 pp.272–273)\n\nIn January 1930, Japan rejoined the gold standard at the prewar exchange rate — badly timed, as the global economy was already in freefall after the Wall Street Crash. Deflation took hold, exports collapsed, and thousands of businesses failed. This was the Showa Depression. In December 1931, Finance Minister Takahashi Korekiyo took Japan off gold, allowed the yen to depreciate sharply, and began financing government spending through Bank of Japan bond purchases. The economy bottomed in 1932 — faster than any other major country. (Miwa 2021 pp.121–124; Takeda 2019 pp.153–155)"}];

// 今日のISO日付（YYYY-MM-DD）
function today(){return new Date().toISOString().slice(0,10);}
function addDays(d,n){
  const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);
}

// ── SRS：時間単位・totalWrong考慮アルゴリズム ──────────────────
// nextDue: ISO timestamp（時刻まで含む）
// state: "new" | "learning" | "review"
// learningステップ（時間）: 10分→1時間→6時間→24時間→72時間→卒業
// 卒業後: intervalは日単位、easeで乗算

const LEARNING_STEPS_H=[1/6, 1, 6, 24, 72]; // 時間単位
const DEFAULT_EASE=2.5;
const MIN_EASE=1.3;

function nowISO(){return new Date().toISOString();}
function addHours(h){return new Date(Date.now()+h*3600000).toISOString();}
function addDaysISO(d){return new Date(Date.now()+d*86400000).toISOString();}
function isDue(card){
  if(!card||!card.nextDue)return true;
  return new Date(card.nextDue)<=new Date();
}

// totalWrongに基づく卒業必要streak数とease
function calcRequiredStreak(totalWrong){
  return Math.min(3+Math.floor(totalWrong/3),8);
}
function calcEase(totalWrong){
  return Math.max(DEFAULT_EASE-totalWrong*0.08,MIN_EASE);
}

function updateSRS(srs,qId,correct){
  const prev=srs[qId]||{
    state:"new",step:0,streak:0,totalWrong:0,
    intervalDays:0,nextDue:nowISO(),reps:0,
  };
  const totalWrong=prev.totalWrong||0;
  const streak=prev.streak||0;
  const step=prev.step||0;

  if(!correct){
    // ミス → streakリセット、10分後
    return{...srs,[qId]:{
      ...prev,state:"learning",step:0,streak:0,
      totalWrong:totalWrong+1,
      intervalDays:0,nextDue:addHours(1/6),reps:prev.reps||0,
    }};
  }

  // 正解
  const newStreak=streak+1;
  const required=calcRequiredStreak(totalWrong);

  if(prev.state==="review"){
    // review中の正解 → ease×interval
    if(newStreak>=required){
      const ease=calcEase(totalWrong);
      const newInterval=Math.min(
        Math.round((prev.intervalDays||1)*ease), 180
      );
      return{...srs,[qId]:{
        ...prev,state:"review",step:0,streak:newStreak,
        totalWrong,intervalDays:newInterval,
        nextDue:addDaysISO(newInterval),reps:(prev.reps||0)+1,
      }};
    }else{
      // まだ卒業できない→learningに戻す
      const nextStepIdx=Math.min(step+1,LEARNING_STEPS_H.length-1);
      return{...srs,[qId]:{
        ...prev,state:"learning",step:nextStepIdx,streak:newStreak,
        totalWrong,intervalDays:0,
        nextDue:addHours(LEARNING_STEPS_H[nextStepIdx]),
        reps:(prev.reps||0)+1,
      }};
    }
  }

  // learning中の正解
  const nextStepIdx=step+1;
  if(nextStepIdx>=LEARNING_STEPS_H.length||newStreak>=required){
    // 卒業 → review
    const ease=calcEase(totalWrong);
    const gradInterval=Math.max(Math.round(1*ease),1);
    return{...srs,[qId]:{
      ...prev,state:"review",step:0,streak:newStreak,
      totalWrong,intervalDays:gradInterval,
      nextDue:addDaysISO(gradInterval),reps:(prev.reps||0)+1,
    }};
  }else{
    // 次のlearningステップへ
    return{...srs,[qId]:{
      ...prev,state:"learning",step:nextStepIdx,streak:newStreak,
      totalWrong,intervalDays:0,
      nextDue:addHours(LEARNING_STEPS_H[nextStepIdx]),
      reps:(prev.reps||0)+1,
    }};
  }
}

// ミスして中断：10分後に再出題
function updateSRSPause(srs,qId){
  const prev=srs[qId]||{state:"new",step:0,streak:0,totalWrong:0,nextDue:nowISO(),reps:0};
  return{...srs,[qId]:{
    ...prev,state:"learning",step:0,streak:0,
    totalWrong:(prev.totalWrong||0)+1,
    intervalDays:0,nextDue:addHours(1/6),
  }};
}

// 今日のデッキ：時間ベースdueで復習/新カードを分ける
function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5);}
function buildTodaysDeck(decks,srs,limit=30){
  const seen=new Set();
  const review=[],newCards=[];
  decks.forEach(dk=>{
    (dk.questions||[]).forEach(q=>{
      if(seen.has(q.id))return;seen.add(q.id);
      const sr=srs[q.id];
      if(!sr) newCards.push(q);      // 新カード（未回答）
      else if(isDue(sr)) review.push(q); // dueのカード（現時刻以降）
    });
  });
  const reviewShuffled=shuffle(review);
  const newShuffled=shuffle(newCards);
  const reviewSlice=reviewShuffled.slice(0,Math.ceil(limit*0.6));
  const newSlice=newShuffled.slice(0,limit-reviewSlice.length);
  return{review:reviewSlice,newCards:newSlice};
}

// 各デッキの現在due数（時間ベース）
function countDue(questions,srs){
  return questions.filter(q=>{
    const sr=srs[q.id];return!sr||isDue(sr);
  }).length;
}

function downloadJSON(data,filename){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=filename;a.click();

function readJSONFile(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{try{res(JSON.parse(e.target.result));}catch{rej(new Error("JSON parse error"));}};
    r.onerror=()=>rej(new Error("Load error"));
    r.readAsText(file);
  });
}
function validateQS(qs){
  if(!Array.isArray(qs)||qs.length===0)return"No questions";
  for(const q of qs){
    if(!q.id||!q.type||!q.pts||!q.q)return`ID ${q.id}: missing required fields`;
    if(q.type==="mc"&&(!Array.isArray(q.opts)||q.opts.length<2))return`ID ${q.id}: invalid opts`;
    if(q.type==="fill"&&(!Array.isArray(q.blanks)||q.blanks.length===0))return`ID ${q.id}: invalid blanks`;
  }
  return null;
}

      const buf=c.createBuffer(1,1,22050);

  try{
    const c=getCtx();
    if(c.state==="suspended"){c.resume().catch(()=>{});return;}
    freqs.forEach((f,i)=>{
      if(!f)return;
      const t=c.currentTime+i*gap/1000;
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type=type;o.frequency.value=f;
      g.gain.setValueAtTime(vol,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+dur);
      o.start(t);o.stop(t+dur+0.05);
    });
  }catch(_){}
};

/* ══════════════════════════════════════════════════════════════
   REDUCER
══════════════════════════════════════════════════════════════ */
function makeInit(QS){
  return{phase:"start",queue:QS.map((_,i)=>i),
    pendingQueue:[],newCardIds:[],viewedNewCount:0,
    answeredCorrectly:[],attemptedIds:[],wrongCounts:{},questionKey:0,
    score:0,combo:0,maxCombo:0,firstTryCorrectCount:0,
    inputs:[],timeLeft:MC_TIMER,feedback:null,showHint:false,shuffled:null};
}
function reducer(s,a){
  switch(a.type){
    case"START":case"RESTART":{
      const q=a.QS[0];
      const base=makeInit(a.QS);
      // newCardIds: SRSデータなしのカードID群（自動入力対象）
      const nids=a.newCardIds||[];
      // pendingStart: 最初のキューに含めるカード数（残りはpendingQueue）
      if(a.pendingStart!=null&&a.pendingStart<a.QS.length){
        return{...base,phase:"question",newCardIds:nids,
               queue:a.QS.slice(0,a.pendingStart).map((_,i)=>i),
               pendingQueue:a.QS.slice(a.pendingStart).map((_,i)=>a.pendingStart+i),
               inputs:emptyInputs(q),
               shuffled:q.type==="mc"?shuffleMC(q):null,
               timeLeft:qTimer(q),questionKey:1};
      }
      return{...base,phase:"question",newCardIds:nids,inputs:emptyInputs(q),
             shuffled:q.type==="mc"?shuffleMC(q):null,timeLeft:qTimer(q),questionKey:1};
    }
    case"TICK":
      if(s.phase!=="question")return s;
      return{...s,timeLeft:Math.max(0,s.timeLeft-1)};
    case"SUBMIT":{
      if(s.phase!=="question")return s;
      const{correct,blankResults=null,QS}=a;
      const qIdx=s.queue[0],cq=QS[qIdx];
      const isNewCard=Array.isArray(s.newCardIds)&&s.newCardIds.includes(cq.id);
      const isFirst=!s.attemptedIds.includes(cq.id);
      if(isNewCard){
        // 新規カード：スコア・wrongCountsはカウントしない、キューから外すだけ
        return{...s,phase:"feedback",queue:s.queue.slice(1),
               viewedNewCount:(s.viewedNewCount||0)+1,
               attemptedIds:[...s.attemptedIds,cq.id],
               feedback:{correct:true,qId:cq.id,correctAns:getCA(cq),blankResults,isFirst,isNewCard:true}};
      }
      if(correct){
        const nc=s.combo+1;
        return{...s,phase:"feedback",queue:s.queue.slice(1),
               answeredCorrectly:[...s.answeredCorrectly,cq.id],
               attemptedIds:isFirst?[...s.attemptedIds,cq.id]:s.attemptedIds,
               score:isFirst?s.score+cq.pts:s.score,
               firstTryCorrectCount:isFirst?s.firstTryCorrectCount+1:s.firstTryCorrectCount,
               combo:nc,maxCombo:Math.max(s.maxCombo,nc),
               feedback:{correct:true,qId:cq.id,correctAns:getCA(cq),blankResults,isFirst}};
      }else{
        return{...s,phase:"feedback",
               queue:[...s.queue.slice(1),qIdx],
               attemptedIds:isFirst?[...s.attemptedIds,cq.id]:s.attemptedIds,
               combo:0,maxCombo:Math.max(s.maxCombo,s.combo),
               wrongCounts:{...s.wrongCounts,[cq.id]:(s.wrongCounts[cq.id]||0)+1},
               feedback:{correct:false,qId:cq.id,correctAns:getCA(cq),blankResults}};
      }
    }
    case"NEXT":{
      const{QS}=a;
      if(s.queue.length===0){
        if(s.pendingQueue&&s.pendingQueue.length>0){
          // 復習フェーズ完了 → 新カードフェーズへ
          const nq=QS[s.pendingQueue[0]];
          return{...s,phase:"question",feedback:null,showHint:false,
                 queue:s.pendingQueue,pendingQueue:[],
                 newPhaseStart:true,  // 新カード開始フラグ
                 timeLeft:qTimer(nq),inputs:emptyInputs(nq),
                 questionKey:s.questionKey+1,
                 shuffled:nq.type==="mc"?shuffleMC(nq):null};
        }
        return{...s,phase:"complete",feedback:null};
      }
      const nq=QS[s.queue[0]];
      return{...s,phase:"question",feedback:null,showHint:false,
             newPhaseStart:false,
             timeLeft:qTimer(nq),inputs:emptyInputs(nq),
             questionKey:s.questionKey+1,
             shuffled:nq.type==="mc"?shuffleMC(nq):null};
    }
    case"CLEAR_NEW_PHASE":return{...s,newPhaseStart:false};
    case"INPUT":{const ni=[...s.inputs];ni[a.idx]=a.v;return{...s,inputs:ni};}
    case"HINT":return{...s,showHint:true};
    case"BACK":return{...makeInit(a.QS),phase:"start"};
    case"RESUME":{
      // セーブデータから復元。その問題のタイマーを全リセット
      const q=a.QS[a.state.queue[0]];
      return{...a.state,
             phase:"question",
             inputs:emptyInputs(q),
             shuffled:q.type==="mc"?shuffleMC(q):null,
             timeLeft:qTimer(q),
             questionKey:(a.state.questionKey||0)+1};
    }
    default:return s;
  }
}

/* ══════════════════════════════════════════════════════════════
   ドットマップ
══════════════════════════════════════════════════════════════ */
function DotMap({QS,queue,pendingQueue,answeredCorrectly,attemptedIds,wrongCounts,phase}){
  const currentId = phase==="question"&&queue.length>0 ? QS[queue[0]]?.id : null;
  const pendingIds=new Set((pendingQueue||[]).map(i=>QS[i]?.id));
  const dotSize = QS.length<=20 ? (DK?14:11) : QS.length<=30 ? (DK?11:9) : (DK?9:7);
  const gap = Math.max(3, dotSize-5);
  return(
    <div style={{padding:`6px ${DK?24:16}px 2px`,display:"flex",flexWrap:"wrap",gap:gap}}>
      {QS.map(q=>{
        const isCurrent = q.id===currentId;
        const isCorrect = answeredCorrectly.includes(q.id);
        const wrongs    = wrongCounts[q.id]||0;
        const attempted = attemptedIds.includes(q.id);
        const isPending = pendingIds.has(q.id);
        let color;
        if(isCurrent)          color="#c9a84c";
        else if(isCorrect&&wrongs===0) color="#4ade80";
        else if(isCorrect&&wrongs>0)   color="#60a5fa";
        else if(attempted&&!isCorrect) color="#f97316";
        else if(isPending)     color="#1e3a5f"; // 新カード（未到達）
        else                   color="#2a2a44";
        return(
          <div key={q.id} style={{
            width:dotSize,height:dotSize,borderRadius:"50%",background:color,flexShrink:0,
            animation:isCurrent?"dotPulse 0.9s ease infinite":"none",
            transition:"background 0.4s ease",
          }}/>
        );
      })}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   穴埋めコンポーネント（インライン式）
══════════════════════════════════════════════════════════════ */
/* ══════════════════════════════════════════════════════════════
   タイプライター Hook（キャラ音付き）
══════════════════════════════════════════════════════════════ */
const charTick=()=>{
  try{
    const c=getCtx();const t=c.currentTime;
    const freq=900+Math.random()*400;
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type="sine";o.frequency.value=freq;
    g.gain.setValueAtTime(0.028,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.022);
    o.start(t);o.stop(t+0.025);
  }catch(_){}
};

const SENT_END=/[.。!?！？]/;

function TypewriterText({text,qkey,style,onDone}){
  const[shown,setShown]=useState(0);
  useEffect(()=>{
    setShown(0);if(!text)return;
    let i=0;
    const id=setInterval(()=>{
      i++;setShown(i);charTick();
      if(i>=text.length){clearInterval(id);onDone&&onDone();}
    },38);
    return()=>clearInterval(id);
  },[text,qkey]);
  return <p style={style}>{text.slice(0,Math.min(shown,text.length))}</p>;
}

/* ══════════════════════════════════════════════════════════════
   穴埋めコンポーネント（文末で一時停止・Enter で続き）
══════════════════════════════════════════════════════════════ */
function FillInline({q,qkey,isNew,inputs,dispatch,isFB,feedback,refs,onSubmit,ghostingRef,onDone}){
  const[shown,setShown]=useState(0);
  const[paused,setPaused]=useState(false);
  const[activeBlank,setActiveBlank]=useState(null);
  const[poppingBlank,setPoppingBlank]=useState(null);
  const[ghosting,setGhosting]=useState(false);
  const tidRef=useRef(null);
  const ghostTid=useRef(null);
  const isComposingRef=useRef(false); // IME変換中フラグ
  const fullText=q.q;

  // IME composition イベントで確実にフラグ管理
  useEffect(()=>{
    const onStart=()=>{ isComposingRef.current=true; };
    const onEnd=()=>{
      // compositionend の直後に keydown が来るブラウザがあるため少し遅延
      setTimeout(()=>{ isComposingRef.current=false; },50);
    };
    window.addEventListener("compositionstart",onStart);
    window.addEventListener("compositionend",onEnd);
    return()=>{
      window.removeEventListener("compositionstart",onStart);
      window.removeEventListener("compositionend",onEnd);
    };
  },[]);

  // ghostingRefを親と同期
  useEffect(()=>{
    if(ghostingRef) ghostingRef.current=ghosting;
  },[ghosting]);

  useEffect(()=>{
    setShown(0);setPaused(false);setActiveBlank(null);setPoppingBlank(null);setGhosting(false);
    clearTimeout(ghostTid.current);
  },[qkey]);

  // 新規カード：全文表示完了から2秒後に正解を自動タイプ
  useEffect(()=>{
    if(shown>=fullText.length&&onDone)onDone();
    if(!isNew||isFB||shown<fullText.length)return;
    clearTimeout(ghostTid.current);
    ghostTid.current=setTimeout(()=>{
      setGhosting(true);
      // 各空欄に正解を1文字ずつタイプ
      let blankIdx=0;
      let charIdx=0;
      const answers=q.blanks.map(b=>b.ans[0]);
      const typeNext=()=>{
        if(blankIdx>=answers.length){
          // 全空欄タイプ完了 → 少し待って送信
          setTimeout(()=>onSubmit(),700);
          return;
        }
        const ans=answers[blankIdx];
        if(charIdx<=ans.length){
          dispatch({type:"INPUT",idx:blankIdx,v:ans.slice(0,charIdx)});
          if(charIdx<ans.length) SFX.typeKey();
          charIdx++;
          ghostTid.current=setTimeout(typeNext,charIdx===0?0:80);
        }
        if(charIdx>ans.length){
          blankIdx++;charIdx=0;
          ghostTid.current=setTimeout(typeNext,300);
        }
      };
      typeNext();
    },2000);
    return()=>clearTimeout(ghostTid.current);
  },[shown,isNew,isFB]);

  useEffect(()=>{
    if(paused||isFB||shown>=fullText.length)return;
    clearInterval(tidRef.current);
    tidRef.current=setInterval(()=>{
      setShown(prev=>{
        const next=prev+1;
        charTick();
        if(SENT_END.test(fullText[prev])&&next<fullText.length){
          const parts=fullText.split("___");
          let cur=0;
          const anyBlankVisible=parts.some((part,i)=>{
            const partEnd=cur+part.length;
            cur=partEnd+3;
            return q.blanks[i]!=null&&next>partEnd;
          });
          if(anyBlankVisible&&!isNew){clearInterval(tidRef.current);setPaused(true);}
        }
        if(next>=fullText.length)clearInterval(tidRef.current);
        return next;
      });
    },38);
    return()=>clearInterval(tidRef.current);
  },[paused,isFB,qkey]);

  // タップ時：即座にタイプ停止＋音＋pop
  const activateBlank=(blankIdx)=>{
    clearInterval(tidRef.current); // 即座にインターバル停止
    setPaused(true);               // タイプ一時停止（再レンダリング止まる）
    SFX.blankOk();
    setPoppingBlank(blankIdx);
    setTimeout(()=>setPoppingBlank(null),400);
    setActiveBlank(blankIdx);
  };

  // Enter：タイプ再開（最後の空欄かつ全文表示済みなら送信）
  const handleKeyDown=(blankIdx,e)=>{
    if(e.key==="Tab"||(e.key==="Enter"&&!isComposingRef.current&&e.keyCode!==229)){
      e.preventDefault();
      if(isFB)return;
      if(ghosting)return; // 自動タイプ中はEnter無効
      const allShown=shown>=fullText.length;
      const isLast=blankIdx===q.blanks.length-1;
      if(isLast&&allShown){
        onSubmit();
      }else if(!isLast){
        // 次の空欄へフォーカス移動＋タイプ再開
        SFX.blankOk();
        setPaused(false);
        setPoppingBlank(blankIdx+1);
        setTimeout(()=>setPoppingBlank(null),400);
        setActiveBlank(blankIdx+1);
        setTimeout(()=>refs.current[blankIdx+1]?.focus(),30);
      }else{
        // 最後の空欄・まだ全文未表示：タイプ再開のみ
        setPaused(false);
      }
    }
  };

  const parts=fullText.split("___");
  let cursor=0;
  const segments=parts.map((part,i)=>{
    const partStart=cursor;
    const partEnd=cursor+part.length;
    cursor=partEnd+3;
    const visLen=Math.max(0,Math.min(part.length,shown-partStart));
    const showBlank=isFB||(shown>partEnd&&q.blanks[i]!=null);
    return{text:part.slice(0,visLen),showBlank,blankIdx:i};
  });

  // 続きがあるか判定
  const hasMore=paused&&shown<fullText.length;

  return(
    <div style={{fontSize:DK?22:18,lineHeight:2.4,fontWeight:700,
      color:"#ece8d8",marginBottom:12,wordBreak:"break-all"}}>
      {segments.map(({text,showBlank,blankIdx},segIdx)=>{
        const isLastSeg=segIdx===segments.length-1;
        const blank=q.blanks[blankIdx];
        const br=blank&&isFB&&feedback?.blankResults!=null?feedback.blankResults[blankIdx]:null;
        const val=inputs[blankIdx]||"";
        const w=Math.max(80,val.length*14+48);
        const isActive=activeBlank===blankIdx;
        const isPopping=poppingBlank===blankIdx;
        // wobble: 表示済み・未アクティブ・一時停止中
        const isWobbling=showBlank&&!isActive&&paused&&!isFB&&br==null;
        const anim=isPopping?"blankPop 0.35s ease":isWobbling?"blankWobble 0.55s ease infinite":"none";
        return(
          <span key={blankIdx}>
            <span>{text}</span>
            {/* 一時停止中・この空欄がアクティブ・後続テキストあり → 続きインジケーター */}
            {hasMore&&showBlank&&blankIdx===(activeBlank??0)&&(
              <span style={{
                display:"inline-block",verticalAlign:"middle",
                marginLeft:4,fontSize:DK?12:10,color:"#c9a84c",
                animation:"continueBlink 0.7s ease infinite",
              }}>▶ Enter</span>
            )}
            {blank&&showBlank&&(
              <span style={{
                display:"inline-block",verticalAlign:"middle",
                margin:"0 3px",
                animation:isPopping?"blankPop 0.35s ease":isWobbling?"blankWobble 0.5s ease infinite":"none",
                transformOrigin:"center",
              }}>
                <input ref={el=>refs.current[blankIdx]=el}
                  key={`blank-${blankIdx}-${qkey}`}
                  style={{
                    display:"block",
                    background:br===true?"rgba(34,197,94,0.18)":br===false?"rgba(239,68,68,0.18)":ghosting?"rgba(201,168,76,0.08)":isActive?"rgba(201,168,76,0.15)":"#1e1e3a",
                    border:`1.5px solid ${br===true?"#22c55e":br===false?"#ef4444":ghosting?"rgba(201,168,76,0.3)":isActive?"#c9a84c":"#4a4a72"}`,
                    borderRadius:7,padding:"2px 8px",
                    color:ghosting?"rgba(201,168,76,0.6)":"#ece8d8",fontSize:16,
                    fontFamily:"inherit",
                    width:w,minWidth:80,
                    textAlign:"center",
                    transition:"background 0.2s, border-color 0.2s",
                    cursor:"pointer",
                    outline:"none",
                  }}
                  value={val}
                  onChange={e=>{dispatch({type:"INPUT",idx:blankIdx,v:e.target.value});SFX.typeKey();}}
                  onFocus={()=>{setActiveBlank(blankIdx);}}
                  onKeyDown={e=>handleKeyDown(blankIdx,e)}
                  onClick={()=>activateBlank(blankIdx)}
                  disabled={isFB}
                  placeholder={`(${blankIdx+1})`}
                  autoComplete="new-password"
                  autoCorrect="off"
                  autoCapitalize="off"
                  spellCheck="false"
                  data-form-type="other"
                  name={`quiz_blank_${blankIdx}_${qkey}`}
                />
              </span>
            )}
          </span>
        );
      })}
    </div>
  );
}

    const r=QS.map(q=>{
      const st=qs[q.id]||{sessions:0,firstTry:0,retryOk:0,wrong:0};
      const sessions=st.sessions||0;
      const ftRate=sessions>0?pct(st.firstTry,sessions):null;
      const avgWrong=sessions>0?Math.round((st.wrong/sessions)*10)/10:null;
      return{...st,q,sessions,ftRate,avgWrong};
    });
    if(sort==="wrong") return[...r].sort((a,b)=>(b.wrong||0)-(a.wrong||0));

            <div style={{display:"flex",flexDirection:"column",gap:8}}>

                const shortQ=q.q.length>40?q.q.slice(0,40)+"…":q.q;

                      </>

                );

          </>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   問題管理パネル（複数選択・一括削除）
══════════════════════════════════════════════════════════════ */
function QManagePanel({QS,setQS,onClose}){
  const T=useT();
  const[selected,setSelected]=useState(new Set());
  const[confirm,setConfirm]=useState(false);

  const toggle=(id)=>setSelected(prev=>{
    const s=new Set(prev);
    s.has(id)?s.delete(id):s.add(id);
    return s;
  });
  const toggleAll=()=>{
    if(selected.size===QS.length)setSelected(new Set());
    else setSelected(new Set(QS.map(q=>q.id)));
  };
  const deleteSelected=()=>{
    setQS(prev=>prev.filter(q=>!selected.has(q.id)));
    setSelected(new Set());
    setConfirm(false);
  };

  const allChecked=QS.length>0&&selected.size===QS.length;
  const someChecked=selected.size>0;

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.80)",
      display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:200,
      padding:"16px",overflowY:"auto"}}>
      <div style={{background:"#13132a",border:"1px solid #2a2a44",borderRadius:18,
        padding:"20px 18px",width:"100%",maxWidth:480,display:"flex",flexDirection:"column",gap:12}}>

        {/* ヘッダー */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:16,fontWeight:800,color:"#ece8d8"}}>{T.manageTitle}</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#666",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>

        {/* ツールバー */}
        <div style={{display:"flex",alignItems:"center",gap:10,
          background:"#0d0d20",borderRadius:10,padding:"10px 12px"}}>
          {/* 全選択チェックボックス */}
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",userSelect:"none"}}>
            <input type="checkbox" checked={allChecked} onChange={toggleAll}
              style={{width:16,height:16,cursor:"pointer",accentColor:"#c9a84c"}}/>
            <span style={{fontSize:12,color:"#aaa"}}>
              {someChecked?T.selectedN(selected.size):T.selectAll}
            </span>
          </label>
          <div style={{flex:1}}/>
          {someChecked&&!confirm&&(
            <button onClick={()=>setConfirm(true)}
              style={{background:"#3a1010",border:"1px solid #c04040",borderRadius:8,
                padding:"5px 14px",fontSize:12,color:"#f87171",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
              {T.deleteN(selected.size)}
            </button>
          )}
          {confirm&&(
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span style={{fontSize:11,color:"#f87171"}}>{T.confirmDel}</span>
              <button onClick={deleteSelected}
                style={{background:"#c04040",border:"none",borderRadius:6,
                  padding:"4px 12px",fontSize:12,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
                {T.delBtn}
              </button>
              <button onClick={()=>setConfirm(false)}
                style={{background:"#2a2a44",border:"none",borderRadius:6,
                  padding:"4px 10px",fontSize:12,color:"#aaa",cursor:"pointer",fontFamily:"inherit"}}>
                {T.backBtn}
              </button>
            </div>
          )}
        </div>

        {/* 問題リスト */}
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {QS.map((q,idx)=>{
            const checked=selected.has(q.id);
            const shortQ=q.q.length>42?q.q.slice(0,42)+"…":q.q;
            const correctAns=getCA(q).join(" · ");
            return(
              <label key={q.id} style={{display:"flex",alignItems:"flex-start",gap:10,
                background:checked?"rgba(201,168,76,0.08)":"#0d0d20",
                border:`1px solid ${checked?"#c9a84c":"#1e1e32"}`,
                borderRadius:10,padding:"10px 12px",cursor:"pointer",
                transition:"all 0.15s",userSelect:"none"}}>
                <input type="checkbox" checked={checked} onChange={()=>toggle(q.id)}
                  style={{width:16,height:16,marginTop:2,cursor:"pointer",accentColor:"#c9a84c",flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,color:checked?"#ece8d8":"#aaa",fontWeight:700,lineHeight:1.5}}>
                    <span style={{color:"#555",marginRight:4,fontSize:11}}>#{idx+1}</span>
                    {shortQ}
                  </div>
                  <div style={{fontSize:11,color:"#c9a84c",marginTop:2}}>{T.ansLabel} {correctAns}</div>
                </div>
              </label>
            );
          })}
        </div>

        {QS.length===0&&(
          <div style={{color:"#555",fontSize:13,textAlign:"center",padding:"12px 0"}}>
            {T.noQs}
          </div>
        )}
      </div>
    </div>
  );
}

function IOPanel({QS,setQS,gSt,setGSt,decks,setDecks,srs,setSRS,onClose}){
  const T=useT();
  const[msg,setMsg]=useState(null);
  const[confirmReset,setConfirmReset]=useState(null); // "stats" | "qs" | null
  const[pendingImport,setPendingImport]=useState(null);
  const[pendingBackup,setPendingBackup]=useState(null);
  const qRef=useRef(),sRef=useRef(),bRef=useRef();
  const flash=(text,ok=true)=>{setMsg({text,ok});setTimeout(()=>setMsg(null),3000);};

  // ── 全データバックアップ ──────────────────────────────────────
  const exportBackup=()=>{
    const backup={
      _type:"econ_backup",version:1,

    };
    downloadJSON(backup,`econ_backup_${new Date().toLocaleDateString("ja-JP").replace(/\//g,"-")}.json`);

  };
  const importBackup=async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const data=await readJSONFile(file);
      if(data._type!=="econ_backup"){flash(T.errNotBackup,false);return;}
      setPendingBackup(data);
    }catch(err){flash("エラー："+err.message,false);}
    e.target.value="";
  };
  const applyBackup=(mode)=>{
    const data=pendingBackup;
    if(mode==="overwrite"){
      // 全データ上書き
      if(data.decks){setDecks(data.decks);saveDecks(data.decks);}
      if(data.srs){setSRS(data.srs);saveSRS(data.srs);}
      if(data.stats){const st={...DEF_ST,...data.stats};setGSt(st);saveSt(st);}
      flash(T.overwriteOk);
    }else{
      // マージ：デッキはID重複スキップ、SRSはnextDueが新しい方を優先、statsはXPが高い方
      if(data.decks){
        const existIds=new Set(decks.map(d=>d.id));
        const merged=[...decks,...(data.decks||[]).filter(d=>!existIds.has(d.id))];
        setDecks(merged);saveDecks(merged);
      }
      if(data.srs){
        const merged={...data.srs};
        Object.entries(srs||{}).forEach(([id,v])=>{
          if(!merged[id]||v.nextDue>merged[id].nextDue) merged[id]=v;
        });
        setSRS(merged);saveSRS(merged);
      }
      if(data.stats&&gSt){
        const st={...DEF_ST,...data.stats,
          totalXP:Math.max(gSt.totalXP,data.stats.totalXP||0),
          plays:Math.max(gSt.plays,data.stats.plays||0),
          bestScore:Math.max(gSt.bestScore,data.stats.bestScore||0),
        };
        setGSt(st);saveSt(st);
      }
      flash(T.mergeOk);
    }
    setPendingBackup(null);
  };

  const exportQ=()=>{
    downloadJSON({_type:"econ_quiz_questions",version:1,questions:QS},
      `questions_${new Date().toLocaleDateString("ja-JP").replace(/\//g,"-")}.json`);
    flash(T.qsExported);
  };
  const importQ=async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const data=await readJSONFile(file);const qs=data.questions||data;
      const err=validateQS(qs);if(err){flash("エラー："+err,false);return;}
      // 重複IDを除いた追加分
      const newIds=new Set(qs.map(q=>q.id));
      const merged=[...QS.filter(q=>!newIds.has(q.id)),...qs];
      if(QS.length===0){
        setQS(qs);flash(T.loadedN(qs.length));
      } else {
        setPendingImport({qs,merged});
      }
    }catch(err){flash("エラー："+err.message,false);}
    e.target.value="";
  };
  const exportS=()=>{
    if(!gSt){flash(T.noStats,false);return;}
    downloadJSON({_type:"econ_quiz_stats",version:1,...gSt},
      `stats_${new Date().toLocaleDateString("ja-JP").replace(/\//g,"-")}.json`);
    flash(T.statsExported);
  };
  const importS=async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const data=await readJSONFile(file);
      if(typeof data.totalXP!=="number"){flash(T.errStatsFormat,false);return;}
      const clean={...DEF_ST,...data};
      setGSt(clean);saveSt(clean);flash(T.statsImported);
    }catch(err){flash("エラー："+err.message,false);}
    e.target.value="";
  };
  const resetS=()=>{
    saveSt(DEF_ST);setGSt({...DEF_ST});flash(T.statsReset);
    setConfirmReset(null);
  };
  const resetQ=()=>{
    setQS(DEFAULT_QS);flash(T.qsReset);
    setConfirmReset(null);
  };
  const Btn=({onClick,color,children})=>(
    <button onClick={onClick} style={{background:color||"#1e1e36",border:`1px solid ${color||"#3a3a58"}`,
      borderRadius:9,padding:"9px 14px",color:color?"#0d0d18":"#ccc",
      fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",width:"100%",textAlign:"left"}}>
      {children}
    </button>
  );
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}}>
      <div style={{background:"#13132a",border:"1px solid #2a2a44",borderRadius:18,
        padding:"24px 20px",width:"100%",maxWidth:360,display:"flex",flexDirection:"column",gap:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:16,fontWeight:800,color:"#ece8d8"}}>{T.ioTitle}</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#666",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>
        {msg&&<div style={{background:msg.ok?"rgba(34,197,94,0.12)":"rgba(239,68,68,0.12)",
          border:`1px solid ${msg.ok?"#22c55e":"#ef4444"}`,borderRadius:9,
          padding:"8px 12px",fontSize:13,color:msg.ok?"#4ade80":"#f87171"}}>{msg.text}</div>}

        {/* インポート方法の選択ダイアログ */}
        {pendingImport&&(
          <div style={{background:"#0d0d20",border:"1px solid #c9a84c",borderRadius:12,padding:"14px"}}>
            <div style={{fontSize:13,color:"#ece8d8",fontWeight:700,marginBottom:4}}>
              {T.pendingN(QS.length, pendingImport.merged.length, pendingImport.qs.length)}
            </div>
            <div style={{fontSize:11,color:"#888",marginBottom:12}}>
              
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{
                setQS(pendingImport.merged);
                setPendingImport(null);
                flash(T.mergedN(pendingImport.merged.length,pendingImport.qs.length));
              }} style={{flex:1,background:"#1e3a1e",border:"1px solid #22c55e",borderRadius:8,
                padding:"8px 0",fontSize:12,color:"#4ade80",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
                {T.addBtn}
              </button>
              <button onClick={()=>{
                setQS(pendingImport.qs);
                setPendingImport(null);
                flash(T.replacedN(pendingImport.qs.length));
              }} style={{flex:1,background:"#1e1e36",border:"1px solid #555",borderRadius:8,
                padding:"8px 0",fontSize:12,color:"#aaa",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
                {T.replaceBtn}
              </button>
              <button onClick={()=>setPendingImport(null)}
                style={{background:"none",border:"1px solid #333",borderRadius:8,
                  padding:"8px 10px",fontSize:12,color:"#555",cursor:"pointer",fontFamily:"inherit"}}>
                ✕
              </button>
            </div>
          </div>
        )}
        <div>
          <div style={{fontSize:11,color:"#666",letterSpacing:1,marginBottom:8}}>{T.backupSec}</div>
          {pendingBackup&&(
            <div style={{background:"#0d0d20",border:"1px solid #c9a84c",borderRadius:12,padding:"14px",marginBottom:8}}>
              <div style={{fontSize:13,color:"#ece8d8",fontWeight:700,marginBottom:4}}>
                {T.backupLabel}
              </div>
              <div style={{fontSize:11,color:"#888",marginBottom:12}}>
                {new Date(pendingBackup.exportedAt).toLocaleDateString()}
                · {T.backupDecks(pendingBackup.decks?.length||0)}
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick={()=>applyBackup("overwrite")}
                  style={{flex:1,background:"#3a1010",border:"1px solid #c04040",borderRadius:8,
                    padding:"8px 0",fontSize:12,color:"#f87171",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
                  {T.overwriteBtn}
                </button>
                <button onClick={()=>applyBackup("merge")}
                  style={{flex:1,background:"#1e3a1e",border:"1px solid #22c55e",borderRadius:8,
                    padding:"8px 0",fontSize:12,color:"#4ade80",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
                  {T.mergeBtn}
                </button>
                <button onClick={()=>setPendingBackup(null)}
                  style={{background:"none",border:"1px solid #333",borderRadius:8,
                    padding:"8px 10px",fontSize:12,color:"#555",cursor:"pointer",fontFamily:"inherit"}}>
                  ✕
                </button>
              </div>
              <div style={{fontSize:10,color:"#555",marginTop:8}}>
                {T.overwriteInfo}
              </div>
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            <Btn onClick={exportBackup}>{T.exportBackupBtn}</Btn>
            <Btn onClick={()=>bRef.current.click()}>{T.importBackupBtn}</Btn>
            <input ref={bRef} type="file" accept=".json" style={{display:"none"}} onChange={importBackup}/>
          </div>
        </div>
        <div>
          <div style={{fontSize:11,color:"#666",letterSpacing:1,marginBottom:8}}>{T.qsSec(QS.length)}</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            <Btn onClick={exportQ}>{T.exportQBtn}</Btn>
            <Btn onClick={()=>qRef.current.click()}>{T.importQBtn}</Btn>
            <input ref={qRef} type="file" accept=".json" style={{display:"none"}} onChange={importQ}/>
            {confirmReset==="qs"?(
          <div style={{display:"flex",gap:6,alignItems:"center",background:"rgba(239,68,68,0.08)",border:"1px solid #c04040",borderRadius:9,padding:"9px 12px"}}>
            <span style={{fontSize:12,color:"#f87171",flex:1}}>{T.confirmResetQs}</span>
            <button onClick={resetQ} style={{background:"#c04040",border:"none",borderRadius:6,padding:"4px 10px",fontSize:12,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>✓</button>
            <button onClick={()=>setConfirmReset(null)} style={{background:"none",border:"1px solid #333",borderRadius:6,padding:"4px 8px",fontSize:12,color:"#555",cursor:"pointer",fontFamily:"inherit"}}>✕</button>
          </div>
        ):(
          <Btn onClick={()=>setConfirmReset("qs")}>{T.resetQBtn}</Btn>
        )}
          </div>
        </div>
        <div>
          <div style={{fontSize:11,color:"#666",letterSpacing:1,marginBottom:8}}>{T.statsSec}</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            <Btn onClick={exportS}>{T.exportSBtn}</Btn>
            <Btn onClick={()=>sRef.current.click()}>{T.importSBtn}</Btn>
            <input ref={sRef} type="file" accept=".json" style={{display:"none"}} onChange={importS}/>
            {confirmReset==="stats"?(
          <div style={{display:"flex",gap:6,alignItems:"center",background:"rgba(239,68,68,0.08)",border:"1px solid #c04040",borderRadius:9,padding:"9px 12px"}}>
            <span style={{fontSize:12,color:"#f87171",flex:1}}>{T.confirmResetStats}</span>
            <button onClick={resetS} style={{background:"#c04040",border:"none",borderRadius:6,padding:"4px 10px",fontSize:12,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>✓</button>
            <button onClick={()=>setConfirmReset(null)} style={{background:"none",border:"1px solid #333",borderRadius:6,padding:"4px 8px",fontSize:12,color:"#555",cursor:"pointer",fontFamily:"inherit"}}>✕</button>
          </div>
        ):(
          <Btn onClick={()=>setConfirmReset("stats")} color="#c04040">{T.resetSBtn}</Btn>
        )}
          </div>
        </div>
        <details style={{fontSize:11,color:"#555",cursor:"pointer"}}>
          <summary style={{color:"#666",marginBottom:6}}>問題JSONの書き方</summary>
          <pre style={{background:"#0d0d20",borderRadius:8,padding:"10px",fontSize:10,color:"#aaa",overflow:"auto",lineHeight:1.6}}>{`{
  "questions": [
    {
      "id": "a3f9b2c1",
      "type": "mc", "pts": 1,
      "q": "問題文",
      "opts": ["A","B","C","D"],
      "ans": 0,
      "hint": "ヒント"
    },
    {
      "id": "e1b4d7f9",
      "type": "fill", "pts": 2,
      "q": "___は何か",
      "blanks": [{"ans": ["正解","よみがな"]}],
      "hint": "ヒント"
    }
  ]
}
※ id はランダムな8文字で。同じ問題を微修正するときは
  id をそのまま使うと成績が引き継がれます。`}</pre>
        </details>
      </div>
    </div>
  );
}


/* ══════════════════════════════════════════════════════════════
   デッキ管理パネル
══════════════════════════════════════════════════════════════ */
function DeckManagerPanel({decks,setDecks,QS,onClose}){
  const T=useT();
  const[msg,setMsg]=useState(null);
  const[editId,setEditId]=useState(null);
  const[editName,setEditName]=useState("");
  const[cardEditDeck,setCardEditDeck]=useState(null);
  const[selected,setSelected]=useState(new Set());
  const[confirmDeleteId,setConfirmDeleteId]=useState(null);
  const[editFolder,setEditFolder]=useState("");
  const fileRef=useRef();
  const addRef=useRef();
  const flash=(text,ok=true)=>{setMsg({text,ok});setTimeout(()=>setMsg(null),3000);};

  const importDeck=async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const data=await readJSONFile(file);
      const qs=data.questions||data;
      const err=validateQS(qs);if(err){flash("エラー："+err,false);return;}
      const name=data.session||file.name.replace(/\.json$/,"");
      const newDeck={id:"dk_"+Date.now(),name,questions:qs,createdAt:new Date().toISOString()};
      const updated=[...decks,newDeck];setDecks(updated);saveDecks(updated);
      flash(T.addedDeck(name,qs.length));
    }catch(err){flash("エラー："+err.message,false);}
    e.target.value="";
  };
  const deleteDeck=id=>{
    const updated=decks.filter(d=>d.id!==id);setDecks(updated);saveDecks(updated);
    setConfirmDeleteId(null);
  };
  const saveName=id=>{
    const updated=decks.map(d=>d.id===id?{...d,name:editName,folder:editFolder}:d);
    setDecks(updated);saveDecks(updated);setEditId(null);
  };
  const exportDeck=dk=>{
    downloadJSON({_type:"econ_quiz_questions",version:1,session:dk.name,questions:dk.questions},
      dk.name.replace(/\s/g,"_")+".json");
    flash(T.exportedDeck(dk.name));
  };

  // カード編集：削除
  const deleteSelected=()=>{
    if(selected.size===0)return;
    const updated=decks.map(d=>d.id===cardEditDeck.id
      ?{...d,questions:d.questions.filter(q=>!selected.has(q.id))}:d);
    setDecks(updated);saveDecks(updated);
    const newDk=updated.find(d=>d.id===cardEditDeck.id);
    setCardEditDeck(newDk);
    setSelected(new Set());
    flash(T.deletedN(selected.size));
  };

  // カード編集：JSONから追加
  const addCards=async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const data=await readJSONFile(file);
      const qs=data.questions||data;
      const err=validateQS(qs);if(err){flash("エラー："+err,false);return;}
      const existIds=new Set(cardEditDeck.questions.map(q=>q.id));
      const newQs=qs.filter(q=>!existIds.has(q.id));
      const merged=[...cardEditDeck.questions,...newQs];
      const updated=decks.map(d=>d.id===cardEditDeck.id?{...d,questions:merged}:d);
      setDecks(updated);saveDecks(updated);
      const newDk=updated.find(d=>d.id===cardEditDeck.id);
      setCardEditDeck(newDk);
      flash(T.addedN(newQs.length,qs.length-newQs.length));
    }catch(err){flash("エラー："+err.message,false);}
    e.target.value="";
  };

  const toggleCard=id=>setSelected(prev=>{
    const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;
  });
  const toggleAll=()=>setSelected(prev=>
    prev.size===cardEditDeck.questions.length?new Set():new Set(cardEditDeck.questions.map(q=>q.id))
  );

  // カード編集画面
  if(cardEditDeck){
    const dk=cardEditDeck;
    const allChecked=selected.size===dk.questions.length&&dk.questions.length>0;
    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.80)",
        display:"flex",alignItems:"flex-start",justifyContent:"center",
        zIndex:200,padding:16,overflowY:"auto"}}>
        <div style={{background:"#13132a",border:"1px solid #2a2a44",borderRadius:18,
          padding:"20px 18px",width:"100%",maxWidth:460,display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={()=>{setCardEditDeck(null);setSelected(new Set());}}
              style={{background:"none",border:"none",color:"#888",fontSize:18,cursor:"pointer"}}>←</button>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:800,color:"#ece8d8"}}>{dk.name}</div>
              <div style={{fontSize:11,color:"#555"}}>{dk.questions.length}問</div>
            </div>
          </div>
          {msg&&<div style={{background:msg.ok?"rgba(34,197,94,0.12)":"rgba(239,68,68,0.12)",
            border:`1px solid ${msg.ok?"#22c55e":"#ef4444"}`,borderRadius:9,
            padding:"8px 12px",fontSize:13,color:msg.ok?"#4ade80":"#f87171"}}>{msg.text}</div>}

          {/* ツールバー */}
          <div style={{display:"flex",alignItems:"center",gap:8,background:"#0d0d20",borderRadius:10,padding:"10px 12px"}}>
            <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",userSelect:"none"}}>
              <input type="checkbox" checked={allChecked} onChange={toggleAll}
                style={{width:16,height:16,accentColor:"#c9a84c"}}/>
              <span style={{fontSize:12,color:"#aaa"}}>
                {selected.size>0?T.selectedN(selected.size):T.selectAll}
              </span>
            </label>
            <div style={{flex:1}}/>
            {selected.size>0&&(
              <button onClick={deleteSelected}
                style={{background:"#3a1010",border:"1px solid #c04040",borderRadius:8,
                  padding:"5px 12px",fontSize:12,color:"#f87171",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
                {T.deleteN(selected.size)}
              </button>
            )}
            <button onClick={()=>addRef.current.click()}
              style={{background:"#1e3a1e",border:"1px solid #22c55e",borderRadius:8,
                padding:"5px 12px",fontSize:12,color:"#4ade80",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
              {T.addCardsBtn}
            </button>
            <input ref={addRef} type="file" accept=".json" style={{display:"none"}} onChange={addCards}/>
          </div>

          {/* カード一覧 */}
          <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:"60vh",overflowY:"auto"}}>
            {dk.questions.map((q,idx)=>{
              const checked=selected.has(q.id);
              const ans=getCA(q).join(" / ");
              const shortQ=q.q.length>44?q.q.slice(0,44)+"…":q.q;
              return(
                <label key={q.id} style={{display:"flex",alignItems:"flex-start",gap:10,
                  background:checked?"rgba(201,168,76,0.08)":"#0d0d20",
                  border:`1px solid ${checked?"#c9a84c":"#1e1e32"}`,
                  borderRadius:10,padding:"10px 12px",cursor:"pointer",userSelect:"none"}}>
                  <input type="checkbox" checked={checked} onChange={()=>toggleCard(q.id)}
                    style={{width:16,height:16,marginTop:2,accentColor:"#c9a84c",flexShrink:0}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,color:checked?"#ece8d8":"#aaa",fontWeight:700,lineHeight:1.5}}>
                      <span style={{color:"#555",marginRight:4,fontSize:11}}>#{idx+1}</span>{shortQ}
                    </div>
                    <div style={{fontSize:11,color:"#c9a84c",marginTop:2}}>→ {ans}</div>
                  </div>
                </label>
              );
            })}
            {dk.questions.length===0&&<div style={{color:"#555",fontSize:13,textAlign:"center",padding:"16px 0"}}>
              {T.noCards}
            </div>}
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.80)",
      display:"flex",alignItems:"flex-start",justifyContent:"center",
      zIndex:200,padding:16,overflowY:"auto"}}>
      <div style={{background:"#13132a",border:"1px solid #2a2a44",borderRadius:18,
        padding:"20px 18px",width:"100%",maxWidth:460,display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:16,fontWeight:800,color:"#ece8d8"}}>{T.deckMgrTitle}</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#666",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>
        {msg&&<div style={{background:msg.ok?"rgba(34,197,94,0.12)":"rgba(239,68,68,0.12)",
          border:`1px solid ${msg.ok?"#22c55e":"#ef4444"}`,borderRadius:9,
          padding:"8px 12px",fontSize:13,color:msg.ok?"#4ade80":"#f87171"}}>{msg.text}</div>}

        {decks.length===0&&<div style={{color:"#555",fontSize:13,textAlign:"center",padding:"16px 0"}}>
          <span style={{whiteSpace:"pre-line"}}>{T.noDecksImport}</span>
        </div>}

        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {decks.map(dk=>(
            <div key={dk.id} style={{background:"#0d0d20",borderRadius:12,padding:"12px 14px"}}>
              {editId===dk.id?(
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  <div style={{display:"flex",gap:8}}>
                    <input value={editName} onChange={e=>setEditName(e.target.value)}
                      onKeyDown={e=>e.key==="Enter"&&saveName(dk.id)}
                      style={{flex:1,background:"#1e1e3a",border:"1px solid #c9a84c",borderRadius:8,
                        padding:"6px 10px",color:"#ece8d8",fontSize:14,fontFamily:"inherit",outline:"none"}}
                      autoFocus/>
                    <button onClick={()=>saveName(dk.id)}
                      style={{background:"#c9a84c",border:"none",borderRadius:8,padding:"6px 12px",
                        fontSize:12,fontWeight:700,color:"#0d0d18",cursor:"pointer",fontFamily:"inherit"}}>{T.saveBtn}</button>
                    <button onClick={()=>setEditId(null)}
                      style={{background:"#1e1e36",border:"1px solid #333",borderRadius:8,padding:"6px 10px",
                        fontSize:12,color:"#888",cursor:"pointer",fontFamily:"inherit"}}>✕</button>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:11,color:"#666"}}>📁</span>
                    <input value={editFolder} onChange={e=>setEditFolder(e.target.value)}
                      placeholder={T.folderPlaceholder}
                      style={{flex:1,background:"#1e1e3a",border:"1px solid #3a3a58",borderRadius:8,
                        padding:"5px 10px",color:"#aaa",fontSize:12,fontFamily:"inherit",outline:"none"}}/>
                  </div>
                </div>
              ):(
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{flex:1,cursor:"pointer",minWidth:0}} onClick={()=>setCardEditDeck(dk)}>

/* ══════════════════════════════════════════════════════════════
